<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Synapse local-k8s 가이드</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --line:#30363d; --fg:#e6edf3; --muted:#8b949e;
    --rest:#58a6ff; --kafka:#d29922; --store:#3fb950; --accent:#bc8cff;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",monospace;
  }
  *{box-sizing:border-box} html,body{margin:0;background:var(--bg);color:var(--fg);
    font-family:system-ui,"Segoe UI","Malgun Gothic",sans-serif;font-size:14px}
  #topbar{display:flex;gap:16px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:10}
  #topbar h1{font-size:16px;margin:0}
  main{display:grid;grid-template-columns:1fr 340px;grid-template-areas:"map panel" "flow panel" "ref ref";gap:12px;padding:12px}
  #map-region{grid-area:map;min-height:420px;background:var(--panel);border:1px solid var(--line);border-radius:8px}
  #panel-region{grid-area:panel;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px;overflow:auto;max-height:80vh}
  #flow-region{grid-area:flow;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px}
  #ref-region{grid-area:ref;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px}
  code,.mono{font-family:var(--mono)}
  .muted{color:var(--muted)}
  footer{padding:10px 16px;border-top:1px solid var(--line);color:var(--muted);font-size:12px}
  button{background:#21262d;color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:5px 10px;cursor:pointer}
  button.active{border-color:var(--accent);color:var(--accent)}
  table.ref{width:100%;border-collapse:collapse;font-size:12px;margin:6px 0}
  table.ref th,table.ref td{border:1px solid var(--line);padding:4px 6px;text-align:left;vertical-align:top}
  table.ref th{color:var(--muted)}
  tr.dep td{opacity:.5}
</style>
</head>
<body>
  <header id="topbar">
    <h1>Synapse <span class="muted">local-k8s</span> 가이드</h1>
    <span id="layer-toggles"></span>
    <span id="scenario-picker" style="margin-left:auto"></span>
  </header>
  <main>
    <section id="map-region"></section>
    <aside id="panel-region"><p class="muted">노드나 연결을 클릭하면 상세가 표시됩니다.</p></aside>
    <section id="flow-region"></section>
    <section id="ref-region"></section>
  </main>
  <footer id="footer"></footer>
  <script>
const SYSTEM = {
  services: {
    gateway:      {label:"gateway", addr:"gateway", port:8080, tier:"edge", color:"#bc8cff", role:"API 게이트웨이(Spring Cloud Gateway)", rest:[

      {method:"ROUTE", path:"/api/knowledge/**",   reqDto:null, resDto:null, desc:"knowledge-svc로 라우팅 (stripPrefix=2)"},
      {method:"ROUTE", path:"/api/learning/**",    reqDto:null, resDto:null, desc:"learning-card-svc로 라우팅 (stripPrefix=2)"},
    ], produces:[], consumes:[], stores:["redis"], calls:["platform","engagement","knowledge","learning-card","learning-ai"]},

      {method:"GET",    path:"/api/v1/auth/callback",            reqDto:null,                       resDto:null,                      desc:"OAuth2 콜백 (userId 파라미터)"},

      {method:"GET",    path:"/api/v1/admin/users",              reqDto:null,                       resDto:"AdminUserPageResponse",   desc:"관리자: 사용자 목록 조회 (ADMIN 전용)"},
      {method:"PUT",    path:"/api/v1/admin/users/{id}/status",  reqDto:"UserStatusChangeRequest",  resDto:null,                      desc:"관리자: 사용자 상태 변경 (active|suspended)"},
      {method:"DELETE", path:"/api/v1/admin/users/{id}",         reqDto:null,                       resDto:null,                      desc:"관리자: 사용자 삭제"},
      {method:"GET",    path:"/api/v1/admin/audit-logs",         reqDto:null,                       resDto:"AuditLogResponse",        desc:"관리자: 감사 로그 조회 (ADMIN 전용)"},
      {method:"GET",    path:"/api/v1/admin/tenants",            reqDto:null,                       resDto:"AdminTenantPageResponse", desc:"관리자: 테넌트 목록 조회"},
      {method:"PUT",    path:"/api/v1/admin/tenants/{id}/status",reqDto:"TenantStatusChangeRequest",resDto:null,                      desc:"관리자: 테넌트 상태 변경"},
      {method:"POST",   path:"/api/v1/billing/checkout",         reqDto:"CheckoutSessionRequest",   resDto:"CheckoutSessionResponse", desc:"Stripe Checkout 세션 생성"},
      {method:"POST",   path:"/api/v1/billing/webhooks",         reqDto:null,                       resDto:null,                      desc:"Stripe 웹훅 수신"},
      {method:"GET",    path:"/api/v1/billing/subscription",     reqDto:null,                       resDto:"SubscriptionResponse",    desc:"현재 구독 정보 조회"},
      {method:"POST",   path:"/api/v1/notifications/devices",    reqDto:"DeviceTokenRequest",       resDto:null,                      desc:"푸시 디바이스 토큰 등록"},

    engagement:   {label:"engagement-svc", addr:"engagement-svc", port:8080, tier:"svc", color:"#3fb950", role:"인게이지먼트(이벤트 소비)", rest:[

      {method:"POST",   path:"/api/v1/community/groups/{groupId}/members/join",  reqDto:null,                         resDto:"MemberResponse",           desc:"그룹 가입 (공개: ACTIVE, 비공개: PENDING)"},
      {method:"PUT",    path:"/api/v1/community/groups/{groupId}/members/{memberId}/approve", reqDto:null,            resDto:"MemberResponse",           desc:"가입 승인"},
      {method:"DELETE", path:"/api/v1/community/groups/{groupId}/members/{memberId}",         reqDto:null,            resDto:null,                       desc:"멤버 제거"},
      {method:"GET",    path:"/api/v1/community/groups/{groupId}/members",       reqDto:null,                         resDto:"MemberResponse",           desc:"멤버 목록 조회"},
      {method:"POST",   path:"/api/v1/community/groups/{groupId}/invite/{token}/accept",  reqDto:null,                resDto:"InviteDecisionResponse",   desc:"초대 수락"},
      {method:"POST",   path:"/api/v1/community/groups/{groupId}/invite/{token}/decline", reqDto:null,                resDto:"InviteDecisionResponse",   desc:"초대 거절"},

      {method:"POST",   path:"/api/v1/community/reports",                        reqDto:"ReportCreateRequest",        resDto:"ReportResponse",           desc:"콘텐츠 신고"},
      {method:"GET",    path:"/api/v1/admin/reports",                            reqDto:null,                         resDto:"ReportResponse",           desc:"신고 목록 조회 (ADMIN)"},
      {method:"PATCH",  path:"/api/v1/admin/reports/{reportId}",                 reqDto:"ReportModerateRequest",      resDto:"ReportResponse",           desc:"신고 처리 (ADMIN)"},

      {method:"GET",    path:"/api/v1/community/search",                         reqDto:null,                         resDto:"SharedContentResponse",    desc:"공유 콘텐츠 검색"},
      {method:"POST",   path:"/api/v1/community/share/{token}/fork",             reqDto:null,                         resDto:"SharedContentResponse",    desc:"공유 콘텐츠 포크"},
      {method:"DELETE", path:"/api/v1/community/share/{id}",                     reqDto:null,                         resDto:null,                       desc:"공유 콘텐츠 삭제"},
      {method:"GET",    path:"/api/v1/gamification/me",                          reqDto:null,                         resDto:"UserGamificationResponse", desc:"내 XP/레벨/뱃지/스트릭 조회"},
      {method:"GET",    path:"/api/v1/gamification/xp/history",                  reqDto:null,                         resDto:"XpEventResponse",          desc:"XP 이벤트 이력 조회"},
      {method:"GET",    path:"/api/v1/gamification/badges",                      reqDto:null,                         resDto:"BadgeResponse",            desc:"전체 뱃지 목록"},
      {method:"GET",    path:"/api/v1/gamification/leaderboard",                 reqDto:null,                         resDto:"LeaderboardEntryResponse", desc:"리더보드 조회"},
      {method:"POST",   path:"/api/v1/gamification/xp/events",                   reqDto:"AddXpRequest",               resDto:"UserGamificationResponse", desc:"XP 직접 적립 (내부/테스트용)"},
    ], produces:[], consumes:["platform.auth.user-registered-v1","learning.card.review-completed-v1"], stores:["postgres:synapse_engagement","redis"], calls:[]},
    knowledge:    {label:"knowledge-svc", addr:"knowledge-svc", port:8080, tier:"svc", color:"#f778ba", role:"노트/지식", rest:[
      {method:"POST",   path:"/api/v1/notes",                         reqDto:"NoteCreateRequest",       resDto:"NoteResponse",            desc:"노트 생성"},

      {method:"GET",    path:"/api/v1/notes/{id}",                    reqDto:null,                      resDto:"NoteResponse",            desc:"노트 단건 조회"},
      {method:"PATCH",  path:"/api/v1/notes/{id}",                    reqDto:"NoteCreateRequest",       resDto:"NoteResponse",            desc:"노트 수정"},
      {method:"DELETE", path:"/api/v1/notes/{id}",                    reqDto:null,                      resDto:null,                      desc:"노트 삭제"},

      {method:"GET",    path:"/api/v1/notes/{id}/outlinks",           reqDto:null,                      resDto:"NoteResponse",            desc:"아웃링크 노트 목록"},
      {method:"GET",    path:"/api/v1/notes/search",                  reqDto:null,                      resDto:"SearchPageResponse",      desc:"키워드 기반 노트 검색 (커서 페이징)"},

      {method:"POST",   path:"/api/v1/ai/search/hybrid",              reqDto:"HybridSearchRequest",     resDto:"HybridSearchResponse",    desc:"하이브리드(키워드+벡터) 검색"},
      {method:"GET",    path:"/api/v1/graph/data",                    reqDto:null,                      resDto:"GraphDataResponse",       desc:"전체 노트 지식 그래프 데이터"},
      {method:"GET",    path:"/api/v1/graph",                         reqDto:null,                      resDto:"GraphDataResponse",       desc:"특정 노트 인접 그래프 (depth 지정)"},
      {method:"POST",   path:"/api/v1/admin/search/accuracy-test",    reqDto:null,                      resDto:"SearchComparisonReport",  desc:"검색 정확도 테스트 실행 (ADMIN)"},
      {method:"GET",    path:"/api/v1/admin/search/accuracy-report",  reqDto:null,                      resDto:"SearchComparisonReport",  desc:"최신 검색 정확도 리포트 조회 (ADMIN)"},
    ], produces:["knowledge.note.note-created-v1","knowledge.note.note-updated-v1"], consumes:[], stores:["postgres:synapse_knowledge","redis","opensearch"], calls:[]},
    "learning-ai":{label:"learning-ai", addr:"learning-ai", port:8080, tier:"svc", color:"#e3b341", role:"AI 카드 생성(Python)", rest:[
      {method:"POST",   path:"/ai/cards/generate",   reqDto:"AiGenerateRequest",        resDto:"AiCardGenerateResponse",   desc:"노트 내용으로 플래시카드 생성 (LLM)"},
      {method:"POST",   path:"/ai/generate",          reqDto:"AiGenerateRequest",        resDto:"AiGenerateResponse",       desc:"범용 AI 텍스트 생성"},
      {method:"POST",   path:"/ai/embeddings",        reqDto:"AiEmbedRequest",           resDto:"AiEmbedResponse",          desc:"배치 텍스트 임베딩 (최대 20개)"},

      {method:"POST",   path:"/ai/qa",                reqDto:"AiQaRequest",              resDto:"AiQaResponse",             desc:"RAG Q&A (stream=true 시 SSE)"},

  infra: {

function runSelfTests(){
  const errs=[];
  const svc=Object.keys(SYSTEM.services), inf=Object.keys(SYSTEM.infra);
  const nodes=new Set([...svc,...inf]);
  SYSTEM.rest.forEach(r=>{ if(!nodes.has(r.from)||!nodes.has(r.to)) errs.push("rest 노드 미존재: "+r.from+"→"+r.to); });
  SYSTEM.events.forEach(e=>{ if(!SYSTEM.services[e.producer]) errs.push("토픽 producer 미존재: "+e.topic);
    e.consumers.forEach(c=>{ if(!SYSTEM.services[c]) errs.push("토픽 consumer 미존재: "+e.topic+"/"+c); }); });
  SYSTEM.scenarios.forEach(s=>s.steps.forEach((st,i)=>{ if(st.node && !nodes.has(st.node)) errs.push("시나리오 노드 미존재: "+s.name+"#"+i); }));
  console.assert(errs.length===0, "[SELFTEST FAIL]\n"+errs.join("\n"));
  console.log(errs.length===0 ? "[SELFTEST PASS] services="+svc.length+" infra="+inf.length+" topics="+SYSTEM.events.length+" rest="+SYSTEM.rest.length : "[SELFTEST FAIL] "+errs.length+"건");
  return errs;
}

  gateway:[500,40],
  platform:[120,180], engagement:[300,180], knowledge:[500,180], "learning-ai":[700,180], "learning-card":[880,180],

let activeLayers = {rest:true, kafka:true, store:true};
function edgeList(){
  const e=[];
  SYSTEM.rest.forEach(r=>e.push({a:r.from,b:r.to,type:"rest"}));
  SYSTEM.events.forEach(ev=>{ e.push({a:ev.producer,b:"kafka",type:"kafka",topic:ev.topic,deprecated:!!ev.deprecated});
    ev.consumers.forEach(c=>e.push({a:"kafka",b:c,type:"kafka",topic:ev.topic,deprecated:!!ev.deprecated})); });
  Object.entries(SYSTEM.services).forEach(([id,s])=>(s.stores||[]).forEach(st=>e.push({a:id,b:st.split(":")[0],type:"store"})));
  return e;
}
function renderMap(){
  const W=1000,H=440, ns="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(ns,"svg");
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`); svg.setAttribute("width","100%"); svg.id="map-svg";
  edgeList().forEach(ed=>{ if(!activeLayers[ed.type]) return;
    const [x1,y1]=POS[ed.a]||[0,0], [x2,y2]=POS[ed.b]||[0,0];
    const p=document.createElementNS(ns,"line");
    p.setAttribute("x1",x1);p.setAttribute("y1",y1);p.setAttribute("x2",x2);p.setAttribute("y2",y2);
    const col = ed.deprecated ? "var(--muted)" : (ed.type==="rest"?"var(--rest)":ed.type==="kafka"?"var(--kafka)":"var(--store)");
    p.setAttribute("stroke",col);
    p.setAttribute("stroke-width",ed.type==="store"?1:2);
    if(ed.type==="kafka")p.setAttribute("stroke-dasharray","5 4");
    p.setAttribute("opacity",ed.deprecated?"0.25":"0.55"); p.dataset.a=ed.a; p.dataset.b=ed.b; p.dataset.type=ed.type;
    if(ed.topic)p.dataset.topic=ed.topic; if(ed.deprecated)p.dataset.deprecated="1";
    p.style.cursor="pointer"; p.addEventListener("click",()=>openEdge(ed));
    svg.appendChild(p);
  });
  const all={...SYSTEM.services,...SYSTEM.infra};
  Object.entries(all).forEach(([id,n])=>{ const [x,y]=POS[id]||[0,0];
    const g=document.createElementNS(ns,"g"); g.style.cursor="pointer"; g.dataset.id=id;
    const isSvc=!!SYSTEM.services[id];
    const r=document.createElementNS(ns,"rect");
    r.setAttribute("x",x-58);r.setAttribute("y",y-16);r.setAttribute("width",116);r.setAttribute("height",32);
    r.setAttribute("rx",6); r.setAttribute("fill","#0d1117");
    r.setAttribute("stroke",isSvc?(n.color||"var(--rest)"):"var(--line)"); r.setAttribute("stroke-width",isSvc?2:1);
    const t=document.createElementNS(ns,"text"); t.setAttribute("x",x);t.setAttribute("y",y+4);

    g.addEventListener("click",()=>openPanel(id));
    g.addEventListener("mouseenter",()=>highlight(id));
    g.addEventListener("mouseleave",()=>highlight(null));
    svg.appendChild(g);
  });
  const reg=document.getElementById("map-region"); reg.innerHTML=""; reg.appendChild(svg);
}
function openEdge(ed){
  let h=`<h3 style="margin-top:0">연결: ${ed.a} → ${ed.b}</h3>`;
  h+=row("종류", ed.type.toUpperCase());
  if(ed.type==="kafka"&&ed.topic){ const ev=SYSTEM.events.find(e=>e.topic===ed.topic);
    h+=row("토픽", `<code>${ed.topic}</code>`);
    if(ev){
      if(ev.deprecated)h+=`<div style="color:var(--kafka);margin:4px 0">⚠ deprecated</div>`;
      h+=row("producer", ev.producer); h+=row("consumers", ev.consumers.length?ev.consumers.join(", "):"<span class='muted'>(없음)</span>");
      if(ev.note)h+=row("비고", ev.note);
      if(ev.schemaFields?.length){ h+=`<div class="muted" style="margin-top:6px">Avro 필드</div>`;
        h+=ev.schemaFields.map(f=>`<div><code>${f.name}</code>: ${f.type}</div>`).join(""); } } }
  if(ed.type==="rest"){ const r=SYSTEM.rest.find(x=>x.from===ed.a&&x.to===ed.b);
    if(r){ h+=row("base", `<code>${r.basePath}</code>`); if(r.note)h+=row("비고", r.note);
      if(r.endpoints?.length)h+=row("경로", r.endpoints.map(p=>`<code>${p}</code>`).join("<br>")); } }
  document.getElementById("panel-region").innerHTML=h;
}

function highlight(id){
  const svg=document.getElementById("map-svg"); if(!svg)return;
  const related=new Set(); if(id){ related.add(id);
    edgeList().forEach(ed=>{ if(ed.a===id)related.add(ed.b); if(ed.b===id)related.add(ed.a); }); }
  svg.querySelectorAll("g[data-id]").forEach(g=>g.style.opacity=(!id||related.has(g.dataset.id))?"1":"0.25");
  svg.querySelectorAll("line").forEach(l=>l.setAttribute("opacity",(!id||l.dataset.a===id||l.dataset.b===id)?"0.9":"0.08"));
}
function row(k,v){ return `<div style="margin:4px 0"><span class="muted">${k}</span> ${v}</div>`; }
function openPanel(id){

    const s=SYSTEM.services[id];
    if(s.stores?.length)h+=row("데이터스토어", s.stores.map(x=>`<code>${x}</code>`).join(", "));
    if(s.produces?.length)h+=row("발행 토픽", s.produces.map(t=>`<code>${t}</code>`).join("<br>"));
    if(s.consumes?.length)h+=row("구독 토픽", s.consumes.map(t=>`<code>${t}</code>`).join("<br>"));
    if(s.calls?.length)h+=row("REST 호출", s.calls.map(c=>`<code>${c}</code>`).join(", "));
    if(s.rest?.length){ h+=`<div class="muted" style="margin-top:8px">REST 엔드포인트 (${s.rest.length})</div>`;
      h+=`<table style="width:100%;font-size:12px;border-collapse:collapse">`+s.rest.map(e=>`<tr><td style="vertical-align:top"><code>${e.method}</code></td><td style="vertical-align:top"><code>${e.path}</code></td><td>${e.desc||""}</td></tr>`).join("")+`</table>`; }
  }
  h+=`<p><button onclick="filterReference('${id}')">레퍼런스에서 보기 →</button></p>`;

}

  const q=refFilter.toLowerCase();
  const ep=[]; Object.entries(SYSTEM.services).forEach(([id,s])=>(s.rest||[]).forEach(e=>ep.push({svc:id,...e})));
  const epRows=ep.filter(e=>!q||(e.svc+e.method+e.path+(e.reqDto||"")+(e.resDto||"")+(e.desc||"")).toLowerCase().includes(q))
    .map(e=>`<tr><td>${e.svc}</td><td><code>${e.method}</code></td><td><code>${e.path}</code></td><td>${e.reqDto||"-"}</td><td>${e.resDto||"-"}</td><td>${e.desc||""}</td></tr>`).join("");
  const tpRows=SYSTEM.events.filter(e=>!q||(e.topic+e.producer+e.consumers.join()).toLowerCase().includes(q))
    .map(e=>`<tr class="${e.deprecated?'dep':''}"><td><code>${e.topic}</code>${e.deprecated?' <span style="color:var(--kafka)">⚠dep</span>':''}</td><td>${e.producer}</td><td>${e.consumers.join(", ")||"-"}</td><td>${(e.schemaFields||[]).map(f=>f.name).join(", ")}</td><td>${e.partitions}</td></tr>`).join("");
  const coRows=SYSTEM.connections.filter(c=>!q||(c.name+c.addr).toLowerCase().includes(q))
    .map(c=>`<tr><td>${c.name}</td><td><code>${c.addr}</code></td><td>${c.envVars.map(v=>`<code>${v}</code>`).join(" ")}</td><td>${c.protocol}</td></tr>`).join("");
  const dtoNames=Object.keys(SYSTEM.dtos).filter(n=>!q||(n+SYSTEM.dtos[n].fields.map(f=>f.name).join()).toLowerCase().includes(q)).sort();
  const dtoRows=dtoNames.map(n=>`<tr><td><code>${n}</code></td><td>${SYSTEM.dtos[n].fields.map(f=>`<code>${f.name}</code>:${f.type}`).join(", ")}</td></tr>`).join("");
  document.getElementById("ref-region").innerHTML=`
    <div style="display:flex;gap:8px;align-items:center"><h3 style="margin:0">📖 종합 레퍼런스</h3>
      <input id="ref-search" placeholder="검색 (서비스/경로/토픽/DTO)…" value="${refFilter.replace(/"/g,'&quot;')}" style="margin-left:auto;width:280px;background:#0d1117;border:1px solid var(--line);color:var(--fg);padding:5px 8px;border-radius:6px">
    </div>
    <h4>REST 엔드포인트 (${ep.length})</h4><table class="ref"><thead><tr><th>서비스</th><th>method</th><th>path</th><th>요청</th><th>응답</th><th>설명</th></tr></thead><tbody>${epRows||'<tr><td colspan="6" class="muted">없음</td></tr>'}</tbody></table>
    <h4>Kafka 토픽 (${SYSTEM.events.length})</h4><table class="ref"><thead><tr><th>토픽</th><th>producer</th><th>consumers</th><th>Avro 필드</th><th>part.</th></tr></thead><tbody>${tpRows}</tbody></table>
    <h4>연결 디렉터리</h4><table class="ref"><thead><tr><th>대상</th><th>주소</th><th>주입 env</th><th>프로토콜</th></tr></thead><tbody>${coRows}</tbody></table>
    <h4>DTO 카탈로그 (${Object.keys(SYSTEM.dtos).length})</h4><table class="ref"><thead><tr><th>DTO</th><th>필드</th></tr></thead><tbody>${dtoRows||'<tr><td colspan="2" class="muted">없음</td></tr>'}</tbody></table>`;
  const inp=document.getElementById("ref-search");
  inp.oninput=e=>{ refFilter=e.target.value; renderReference(); const ni=document.getElementById("ref-search"); ni.focus(); ni.setSelectionRange(ni.value.length,ni.value.length); };
}
function filterReference(id){ refFilter=id; renderReference(); document.getElementById("ref-region").scrollIntoView({behavior:"smooth"}); }

let flowTimer=null;
function renderScenarioPicker(){
  const host=document.getElementById("scenario-picker"); host.innerHTML="";
  SYSTEM.scenarios.forEach(s=>{ const b=document.createElement("button"); b.textContent="▶ "+s.name;
    b.onclick=()=>playScenario(s.name); host.appendChild(b); });
}
function renderFlowRegion(){ document.getElementById("flow-region").innerHTML=
  `<div id="flow-steps" class="muted">상단의 시나리오를 선택하면 흐름이 재생됩니다.</div>`; }
function playScenario(name){
  const sc=SYSTEM.scenarios.find(s=>s.name===name); if(!sc)return;
  const svg=document.getElementById("map-svg"); if(!svg)return;
  if(flowTimer)cancelAnimationFrame(flowTimer);
  const ns="http://www.w3.org/2000/svg";
  let dot=document.getElementById("flow-dot");
  if(!dot){ dot=document.createElementNS(ns,"circle"); dot.id="flow-dot"; dot.setAttribute("r",7);
    dot.setAttribute("fill","#fff"); dot.setAttribute("stroke","#000"); dot.setAttribute("stroke-width","1"); svg.appendChild(dot); }
  else if(dot.parentNode!==svg){ svg.appendChild(dot); }
  const steps=sc.steps, stepsHost=document.getElementById("flow-steps");
  function showStep(k){ stepsHost.innerHTML=steps.map((st,idx)=>
    `<div style="padding:3px 0;${idx===k?'color:var(--accent);font-weight:600':'opacity:.6'}">${idx+1}. ${st.narration}</div>`).join(""); }
  function animateTo(from,to,done){
    const [x1,y1]=POS[from], [x2,y2]=POS[to]; const t0=performance.now(), dur=900;
    (function frame(t){ const p=Math.min(1,(t-t0)/dur);
      dot.setAttribute("cx",x1+(x2-x1)*p); dot.setAttribute("cy",y1+(y2-y1)*p);
      if(p<1)flowTimer=requestAnimationFrame(frame); else done(); })(t0);
  }
  let i=0; showStep(0);
  dot.setAttribute("cx",POS[steps[0].node][0]); dot.setAttribute("cy",POS[steps[0].node][1]);
  i=1;
  function next(){ if(i>=steps.length)return; showStep(i);
    const from=steps[i-1].node, to=steps[i].node;
    animateTo(from,to,()=>{ i++; setTimeout(next,350); }); }
  if(steps.length>1) next();
}

    window.addEventListener('DOMContentLoaded', ()=>{ runSelfTests(); renderLayerToggles(); renderScenarioPicker(); renderMap(); renderFlowRegion(); renderReference(); });
  </script>
</body>
