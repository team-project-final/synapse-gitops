/* ===== TOKENS (local-k8s-guide.html에서 복사) ===== */
:root{
    /* surfaces */
    --bg:#0e1116; --panel:#161b22; --surface-2:#21262d; --line:#30363d;
    /* text tiers */
    --fg:#e6edf3; --muted:#8b949e; --dim:#6e7681;
    /* semantic / functional color (의미 잠금 — DESIGN.md) */
    --rest:#58a6ff; --kafka:#d29922; --store:#3fb950; --accent:#bc8cff; --danger:#f85149;
    /* type */
    --sans:"Geist","Pretendard","Malgun Gothic","Apple SD Gothic Neo","Segoe UI",sans-serif;
    --mono:"Geist Mono","SFMono-Regular",Consolas,"Liberation Mono",monospace;
    /* spacing scale (4px base, compact) */
    --xs:4px; --sm:6px; --md:8px; --lg:12px; --xl:16px;
    /* radius */
    --r-sm:6px; --r-md:8px; --r-lg:10px;
  }

/* ===== BASE ===== */
* { box-sizing:border-box; }
html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
  font-family:var(--sans); font-size:13px; line-height:1.5; }
.mono { font-family:var(--mono); }
#topbar { display:flex; align-items:center; gap:var(--lg);
  height:44px; padding:0 var(--lg); border-bottom:1px solid var(--line);
  font-family:var(--mono); font-weight:600; font-size:16px; letter-spacing:-0.01em; }
#topbar .spacer { flex:1; }
button { font-family:var(--mono); font-size:12px; color:var(--fg);
  background:var(--surface-2); border:1px solid var(--line); border-radius:6px;
  padding:4px 10px; cursor:pointer; transition:150ms ease; }
button[aria-pressed="true"]{ border-color:var(--accent); color:var(--accent); }

/* ===== DETAIL PANEL ===== */
#detail{ position:fixed; right:0; top:44px; width:340px; max-height:80vh; overflow:auto;
  background:var(--panel); border-left:1px solid var(--line); padding:var(--lg); z-index:5; }
#detail .k{ font-family:var(--mono); font-size:11px; text-transform:uppercase;
  color:var(--dim); margin-top:var(--md); }
#detail code{ font-family:var(--mono); color:var(--accent); word-break:break-all; }
a:hover{ color:var(--accent) !important; }
.node:focus rect{ stroke:var(--accent) !important; }
/* 발표 모드: 슬라이드를 뷰포트 세로 중앙에 구성(고정 푸터 48px 회피) */
#stage.slidewrap{ min-height:calc(100vh - 44px); display:flex; flex-direction:column;
  justify-content:center; align-items:center; padding-bottom:48px; }
#stage.slidewrap .slide{ width:100%; }

/* ===== DECK — web-presentation 엔진 (발표 모드 캐러셀) ===== */
#stage.deckwrap{ padding:0; height:calc(100vh - 44px); }
.presentation{ width:100%; height:calc(100vh - 44px); display:grid; place-items:center; overflow:hidden; }
.slides{ width:960px; height:540px; position:relative; display:grid;
  transform:scale(var(--slide-scale,1)); transform-origin:center center; }
.slide{ grid-area:1/1; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center;
  padding:36px 52px; opacity:0; visibility:hidden; transition:opacity .5s ease, transform .5s ease, visibility .5s;
  background:var(--panel); border:1px solid var(--line); border-radius:var(--r-md); overflow:hidden; transform:scale(.97); }
.slide.active{ opacity:1; visibility:visible; z-index:1; transform:scale(1); }
.slide-content{ width:100%; max-height:100%; }
.slide h1{ font-family:var(--mono); font-size:40px; font-weight:600; color:#fff; margin:0 0 10px; letter-spacing:-.01em; line-height:1.25; }
.slide h2{ font-family:var(--mono); font-size:28px; font-weight:600; color:var(--accent); margin:0 0 14px; line-height:1.3; }
.slide h3{ font-family:var(--mono); font-size:17px; font-weight:600; color:var(--kafka); margin:0 0 8px; }
.slide h4{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.02em; color:var(--muted); margin:0 0 6px; }
.slide p{ font-size:16px; line-height:1.5; margin:0 0 8px; }
.slide ul,.slide ol{ font-size:15px; line-height:1.6; padding-left:22px; margin:0 0 8px; }
.slide li{ margin-bottom:3px; }
.slide .subtitle{ font-size:20px; color:var(--muted); }
.slide.title-slide{ text-align:center; align-items:center; background:linear-gradient(135deg,#161b22,#0e1116 65%,#0b0e13); }
.slide.title-slide h1{ font-size:44px; background:linear-gradient(135deg,var(--accent),var(--rest));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.slide .hero-host{ display:block; }
.slide .hero-host svg{ max-height:300px !important; }
.slide .hero-host .badges{ padding:var(--xs) 0 !important; justify-content:center; }
.slide table{ font-size:13px; }
.fragment{ opacity:0; transform:translateY(12px); transition:opacity .4s ease, transform .4s ease; transition-delay:var(--step-delay,0s); }
.fragment.visible{ opacity:1; transform:translateY(0); }
.callout{ background:rgba(88,166,255,.07); border-left:4px solid var(--rest); padding:9px 14px;
  border-radius:0 var(--r-md) var(--r-md) 0; margin:8px 0; font-size:14px; line-height:1.5; }
.callout.warning{ border-left-color:var(--kafka); background:rgba(210,153,34,.08); }
.callout.danger{ border-left-color:var(--danger); background:rgba(248,81,73,.08); }
.callout.ok{ border-left-color:var(--store); background:rgba(63,185,80,.08); }
.deck-code{ background:#0d1117; border:1px solid var(--line); border-radius:var(--r-md); padding:10px 14px; margin:8px 0; overflow-x:auto; }
.deck-code pre{ margin:0; font-family:var(--mono); font-size:12.5px; line-height:1.5; color:#d4d4d4; white-space:pre-wrap; word-break:break-all; }
.code-line{ display:block; padding:0 6px; transition:background-color .3s ease,opacity .3s ease; }
.code-line.highlighted{ background:rgba(188,140,255,.14); border-left:3px solid var(--accent); padding-left:3px; }
.deck-code.has-highlight .code-line:not(.highlighted){ opacity:.4; }
.two-columns{ display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start; }
.progress-bar{ position:fixed; bottom:0; left:0; width:100%; height:3px; background:rgba(255,255,255,.08); z-index:50; }
.progress-fill{ height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--rest)); transition:width .3s ease-out; }
.slide-counter{ position:fixed; bottom:10px; right:18px; font-family:var(--mono); font-size:12px; color:var(--dim); z-index:50; user-select:none; }
.deck-help{ position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:120; display:none; place-items:center; }
.deck-help.show{ display:grid; }
.deck-help .box{ background:var(--panel); border:1px solid var(--line); border-radius:var(--r-lg); padding:24px 32px; max-width:420px; }
.deck-help h3{ font-family:var(--mono); color:var(--accent); margin:0 0 12px; }
.deck-help table{ width:100%; font-size:13px; } .deck-help td{ padding:4px 0; }
.deck-help kbd{ font-family:var(--mono); background:var(--surface-2); border:1px solid var(--line); border-radius:4px; padding:1px 7px; font-size:12px; }
body.deck-overview .slides{ grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; padding:20px;
  overflow-y:auto; max-height:calc(100vh - 44px); transform:none !important; }
body.deck-overview .slide{ grid-area:auto; opacity:1; visibility:visible; transform:none !important; cursor:pointer;
  border:2px solid transparent; content-visibility:auto; contain-intrinsic-size:220px 124px; }
body.deck-overview .slide.active{ border-color:var(--accent); }
.vt-active .slide{ transition:none !important; }
::view-transition-old(root){ animation:vtout .3s ease; } ::view-transition-new(root){ animation:vtin .3s ease; }
@keyframes vtout{ to{ opacity:0; } } @keyframes vtin{ from{ opacity:0; } }
@media print{ @page{ size:960px 540px landscape; margin:0; }
  #topbar,#detail,.progress-bar,.slide-counter,.deck-help{ display:none !important; }
  .presentation,.slides{ display:block; height:auto; transform:none !important; }
  .slide{ break-before:page; opacity:1 !important; visibility:visible !important; transform:none !important; width:960px; height:540px; }
  .fragment{ opacity:1 !important; transform:none !important; } }

/* ===== DECK 컴포넌트 추가 (Step3 콘텐츠 확장) ===== */
.slide table{ width:100%; border-collapse:collapse; font-size:13px; margin:8px 0; }
.slide th{ background:rgba(188,140,255,.1); color:var(--accent); font-family:var(--mono); font-size:11px; text-transform:uppercase; text-align:left; padding:6px 9px; border-bottom:1px solid var(--line); }
.slide td{ padding:6px 9px; border-bottom:1px solid rgba(255,255,255,.06); vertical-align:top; }
.diagram{ display:flex; align-items:center; justify-content:center; gap:10px; margin:12px 0; flex-wrap:wrap; }
.diagram-box{ background:rgba(188,140,255,.06); border:1px solid var(--line); border-radius:var(--r-md); padding:8px 16px; text-align:center; min-width:96px; }
.diagram-box.highlight{ border-color:var(--accent); background:rgba(188,140,255,.14); }
.diagram-box h4{ font-family:var(--mono); color:var(--accent); margin:0 0 2px; font-size:13px; }
.diagram-box p{ font-size:11px; color:var(--muted); margin:0; }
.diagram-arrow{ color:var(--dim); font-size:18px; }
.compare-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:10px 0; }
.compare-card{ background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:var(--r-md); padding:12px 14px; }
.compare-card h4{ font-family:var(--mono); font-size:13px; margin:0 0 6px; }
.compare-card.good{ border-color:rgba(63,185,80,.4); } .compare-card.good h4{ color:var(--store); }
.compare-card.bad{ border-color:rgba(248,81,73,.4); } .compare-card.bad h4{ color:var(--danger); }

.tag-blue{ background:rgba(88,166,255,.16); color:var(--rest); }
.tag-green{ background:rgba(63,185,80,.16); color:var(--store); }

.refdoc th{ color:var(--accent); font-family:var(--mono); font-size:11px; text-transform:uppercase; }
.refdoc .diagram{ justify-content:flex-start; }
.refdoc .deck-code,.refdoc .callout,.refdoc .compare-grid{ max-width:900px; }

/* ===== Step2 폴리시: 노트 패널 · 자동재생 · 발표자 노트 ===== */
.speaker-notes{ display:none; }

.notes-panel.show{ transform:translateY(0); }
.notes-panel .notes-empty{ color:var(--dim); font-style:italic; }
.autoplay-indicator{ position:fixed; bottom:10px; left:18px; font-size:18px; color:var(--muted); z-index:60;

.autoplay-indicator.show{ opacity:1; }
.autoplay-indicator.fade-out{ animation:autoFade 2s ease forwards; }
@keyframes autoFade{ 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
@media print{ .notes-panel,.autoplay-indicator{ display:none !important; } }

let CURRENT_ENV = SYSTEM.meta.env;
let MODE = "slide";          // "slide" | "ref"
let SLIDE = 0;

const EDGE_COLOR = { rest:"var(--rest)", kafka:"var(--kafka)",
                     store:"var(--store)", route:"var(--accent)" };
const GX = 120, GY = 92, NW = 190, NH = 50, NFONT = 19;
function nodePos(n){ return { cx:n.x*GX, cy:n.y*GY }; }

function renderTopology(){
  const t = SYSTEM.topology;
  // viewBox를 노드 범위에 타이트하게 맞춰 다운스케일 시 텍스트가 뭉개지지 않게 한다.
  const W = 12.4*GX, H = 6.4*GY;
  const out = ['<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" role="img" aria-label="AWS 토폴로지" style="max-height:70vh">'];
  for(const e of t.edges){
    const a = nodePos(t.nodes.find(function(n){return n.id===e.from;}));
    const b = nodePos(t.nodes.find(function(n){return n.id===e.to;}));
    out.push('<line x1="'+a.cx+'" y1="'+a.cy+'" x2="'+b.cx+'" y2="'+b.cy+
      '" style="stroke:'+EDGE_COLOR[e.kind]+';stroke-width:2.4;opacity:.5"/>');
  }
  for(const n of t.nodes){
    const p = nodePos(n);
    const stroke = n.color || "var(--line)";
    out.push(
      '<g class="node" data-id="'+n.id+'" tabindex="0" style="cursor:pointer">'+
      '<rect x="'+(p.cx-NW/2)+'" y="'+(p.cy-NH/2)+'" width="'+NW+'" height="'+NH+
        '" rx="8" style="fill:var(--panel);stroke:'+stroke+';stroke-width:2"/>'+
      '<text x="'+p.cx+'" y="'+(p.cy+NFONT/3)+'" text-anchor="middle" '+
        'style="font-family:var(--mono);font-size:'+NFONT+'px;font-weight:500;fill:var(--fg)">'+n.label+'</text>'+
      '</g>');
  }
  out.push('</svg>');
  return out.join('');
}

function envBadges(env){
  const e = SYSTEM.envs[env];
  const items = [
    'EKS '+e.eksNodes+' nodes', 'MSK '+e.mskBrokers+' broker',

  return '<div class="badges" style="display:flex;gap:var(--sm);flex-wrap:wrap;'+
    'padding:var(--md) 0;transition:opacity 300ms ease">'+
    items.map(function(x){return '<span class="mono" style="font-size:11px;color:var(--muted);'+
      'border:1px solid var(--line);border-radius:9999px;padding:2px 8px">'+x+'</span>';}).join('')+
    '</div>';
}
function heroHTML(env){ return envBadges(env) + renderTopology(); }

function renderEnvToggle(){
  const box = document.getElementById('env-toggle');
  box.innerHTML = Object.keys(SYSTEM.envs).map(function(k){
    return '<button type="button" data-env="'+k+'" aria-pressed="'+(k===CURRENT_ENV)+'">'+
      SYSTEM.envs[k].label+'</button>';}).join('');
  box.querySelectorAll('button').forEach(function(b){
    b.addEventListener('click', function(){ setEnv(b.dataset.env); });
  });
}
function applyEnv(){
  // 모드와 무관하게 화면에 떠 있는 모든 히어로(.hero-host)를 갱신한다.
  document.querySelectorAll('.hero-host').forEach(function(host){
    const badges = host.querySelector('.badges');
    if(badges){
      badges.style.opacity = 0;
      setTimeout(function(){ host.innerHTML = heroHTML(CURRENT_ENV); }, 150);
    } else {
      host.innerHTML = heroHTML(CURRENT_ENV);
    }
  });
}
function setEnv(env){
  CURRENT_ENV = env;
  renderEnvToggle();
  applyEnv();
}

const KIND_LABEL = { rest:"REST", kafka:"Kafka", store:"데이터", route:"라우트" };
function nodeConnections(id){
  const t = SYSTEM.topology;
  const nm = function(x){ const n=t.nodes.find(function(z){return z.id===x;}); return n?n.label:x; };
  const out = [];
  t.edges.forEach(function(e){
    if(e.from===id) out.push('→ '+nm(e.to)+'  ('+(KIND_LABEL[e.kind]||e.kind)+')');
    if(e.to===id)   out.push('← '+nm(e.from)+'  ('+(KIND_LABEL[e.kind]||e.kind)+')');
  });
  return out;
}
function showDetail(id){
  const n = SYSTEM.topology.nodes.find(function(x){return x.id===id;});
  if(!n) return;
  const conns = nodeConnections(id);
  const el = document.getElementById('detail');
  el.innerHTML =
    '<h3 class="mono" style="font-size:18px;margin:0 0 var(--xs)">'+n.label+'</h3>'+
    '<div style="color:var(--muted);margin-bottom:var(--sm)">'+n.role+'</div>'+
    (n.spec?'<div class="k">스펙</div><div>'+n.spec+'</div>':'')+
    '<div class="k">설명</div><div>'+n.detail+'</div>'+
    (n.why?'<div class="k">왜 이렇게</div><div>'+n.why+'</div>':'')+
    (conns.length?'<div class="k">연결</div>'+conns.map(function(c){
      return '<div style="font-family:var(--mono);font-size:12px;color:var(--muted)">'+c+'</div>';}).join(''):'')+
    (n.tfFile?'<div class="k">terraform</div><code>infra/aws/dev/'+n.tfFile+'</code>':'')+
    (n.verifyCmd?'<div class="k">접속 확인</div><code>'+n.verifyCmd+'</code>':'');
  el.hidden = false;
}

/* 블록 렌더러 — 발표/레퍼런스 공용 (SYSTEM.chapters[].slides[].blocks[]) */
function renderBlock(b){
  if(b.p)     return '<p>'+b.p+'</p>';
  if(b.ul)    return '<ul>'+b.ul.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ul>';
  if(b.co)    return '<div class="callout'+(b.k?' '+b.k:'')+'">'+b.co+'</div>';
  if(b.hero)  return '<section class="hero-host">'+heroHTML(CURRENT_ENV)+'</section>';
  if(b.gloss) return renderGlossaryTable();
  if(b.code){
    if(b.hl){
      const lines = b.code.split('\n').map(function(ln,i){
        return '<span class="code-line" data-line="'+(i+1)+'">'+(ln===''?'&nbsp;':ln)+'</span>';}).join('');
      return '<div class="deck-code" data-highlight-steps="'+b.hl+'"><pre>'+lines+'</pre></div>';
    }
    return '<div class="deck-code"><pre>'+b.code+'</pre></div>';
  }
  if(b.dia)   return '<div class="diagram">'+b.dia.map(function(d,i){
    return (i>0?'<span class="diagram-arrow">→</span>':'')+
      '<div class="diagram-box'+(d.hi?' highlight':'')+'"><h4>'+d.h+'</h4>'+(d.d?'<p>'+d.d+'</p>':'')+'</div>';}).join('')+'</div>';
  if(b.cmp)   return '<div class="compare-grid">'+b.cmp.map(function(c){
    return '<div class="compare-card '+(c.bad?'bad':'good')+'"><h4>'+c.h+'</h4><p>'+c.html+'</p></div>';}).join('')+'</div>';
  if(b.tbl)   return '<table><thead><tr>'+b.tbl.head.map(function(h){return '<th>'+h+'</th>';}).join('')+
    '</tr></thead><tbody>'+b.tbl.rows.map(function(r){return '<tr>'+r.map(function(x){return '<td>'+x+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table>';
  if(b.two)   return '<div class="two-columns"><div>'+b.two[0].map(renderBlock).join('')+
    '</div><div>'+b.two[1].map(renderBlock).join('')+'</div></div>';
  return '';
}
function slideHead(c, s, first){
  if(first) return '<h2>'+c.title+'</h2>'+(s.t?'<p class="subtitle">'+s.t+'</p>':'');
  return '<h4>'+c.title+'</h4>'+(s.t?'<h2>'+s.t+'</h2>':'');
}
function slideInner(c, s, first, frag){
  if(c.kind==="title"){
    const tags = (s.tags||[]).map(function(t,i){
      const cl=['tag-purple','tag-blue','tag-green','tag-amber','tag-red'][i%5];
      return '<span class="tag '+cl+'">'+t+'</span>';}).join('');
    return '<h1>'+c.title+'</h1>'+(s.sub?'<p class="subtitle">'+s.sub+'</p>':'')+
      (tags?'<p style="margin-top:16px">'+tags+'</p>':'');
  }
  const blocks = (s.blocks||[]).map(function(b,i){
    const h = renderBlock(b);
    return frag ? '<div class="fragment" data-step="'+(i+1)+'">'+h+'</div>' : h;
  }).join('');
  return slideHead(c,s,first)+blocks;
}

const DECK = (function(){
  let slides=[], cur=0, animating=false, isOverview=false;
  let isNotesVisible=false, autoOn=false, autoTimer=null; const AUTO_MS=7000;
  let onKey=null,onResize=null,onPD=null,onPU=null,onHash=null,onSlidesClick=null,pX=0,pY=0;
  const pchan = (typeof BroadcastChannel!=='undefined') ? new BroadcastChannel('presenter-sync') : null;
  function fit(){
    const pres=document.querySelector('.presentation'), sl=document.querySelector('.slides');
    if(!pres||!sl) return;
    const W=960,H=540,M=.04, aw=pres.clientWidth*(1-M*2), ah=pres.clientHeight*(1-M*2);
    sl.style.setProperty('--slide-scale', Math.min(aw/W, ah/H));
  }
  function reveal(s){ s.querySelectorAll('.fragment').forEach(function(f){ const st=parseInt(f.dataset.step)||1;
    f.style.setProperty('--step-delay',(st-1)*0.18+'s'); f.classList.add('visible'); }); }
  function resetFrag(s){ s.querySelectorAll('.fragment').forEach(function(f){ f.style.setProperty('--step-delay','0s'); f.classList.remove('visible'); }); }
  function hl(s){ s.querySelectorAll('.deck-code[data-highlight-steps]').forEach(function(b){
    const groups=b.dataset.highlightSteps.split('|').map(function(g){ return g.split(',').flatMap(function(r){
      const p=r.trim().split('-').map(Number); return p[1]?Array.from({length:p[1]-p[0]+1},function(_,i){return p[0]+i;}):[p[0]]; }); });
    if(groups[0]){ b.classList.add('has-highlight'); b.querySelectorAll('.code-line').forEach(function(el){
      el.classList.toggle('highlighted', groups[0].indexOf(parseInt(el.dataset.line))>=0); }); } }); }
  function curNotes(){ const s=slides[cur]; const n=s?s.querySelector('.speaker-notes'):null; return n?n.innerHTML:''; }
  function updateNotes(){ const np=document.getElementById('dNotes'); if(!np||!isNotesVisible) return;
    const t=curNotes(); np.innerHTML = t ? t : '<span class="notes-empty">노트 없음</span>'; }
  function toggleNotes(){ isNotesVisible=!isNotesVisible; const np=document.getElementById('dNotes');
    if(np) np.classList.toggle('show',isNotesVisible); updateNotes(); }
  function syncPresenter(){ if(!pchan||!slides[cur]) return;
    pchan.postMessage({ type:'slide-change', index:cur, total:slides.length, notes:curNotes(),
      slideHTML:slides[cur].outerHTML, nextSlideHTML: cur<slides.length-1?slides[cur+1].outerHTML:'' }); }
  function showAutoInd(icon){ const a=document.getElementById('dAuto'); if(!a) return;
    a.textContent=icon; a.className='autoplay-indicator show'; setTimeout(function(){ a.className='autoplay-indicator fade-out'; },100); }
  function stopAutoTimer(){ if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; } }
  function startAuto(){ if(!autoOn) return; stopAutoTimer();
    autoTimer=setTimeout(function(){ if(cur<slides.length-1){ show(cur+1); startAuto(); } else { autoOn=false; showAutoInd('⏹'); } }, AUTO_MS); }
  function toggleAuto(){ autoOn=!autoOn; if(autoOn){ showAutoInd('▶'); startAuto(); } else { stopAutoTimer(); showAutoInd('⏸'); } }
  function onUserInput(){ if(autoOn){ stopAutoTimer(); startAuto(); } }
  function show(i){
    if(i<0||i>=slides.length) return; if(animating&&!isOverview) return;
    const old=cur;
    function run(){ animating=true;
      slides[old].setAttribute('aria-hidden','true'); slides[old].setAttribute('inert',''); resetFrag(slides[old]); slides[old].classList.remove('active');
      cur=i;
      slides[cur].removeAttribute('aria-hidden'); slides[cur].removeAttribute('inert'); slides[cur].classList.add('active'); slides[cur].focus({preventScroll:true});
      setTimeout(function(){ reveal(slides[cur]); },140); hl(slides[cur]);
      history.replaceState(null,'','#'+slides[cur].id);
      const pf=document.getElementById('dProg'), cc=document.getElementById('dCur');
      if(pf) pf.style.width=(slides.length>1?(cur/(slides.length-1))*100:100)+'%'; if(cc) cc.textContent=cur+1;
      updateNotes(); syncPresenter();
      setTimeout(function(){ animating=false; },600);
    }
    if(!isOverview && document.startViewTransition){ document.body.classList.add('vt-active');
      document.startViewTransition(run).finished.then(function(){ document.body.classList.remove('vt-active'); }); }
    else run();
  }
  function overview(){ isOverview=!isOverview; document.body.classList.toggle('deck-overview',isOverview);
    slides.forEach(function(s,j){ if(isOverview){ s.removeAttribute('inert'); s.removeAttribute('aria-hidden'); }
      else if(j!==cur){ s.setAttribute('inert',''); s.setAttribute('aria-hidden','true'); } }); }
  function fsToggle(){ if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(function(){}); else document.exitFullscreen(); }
  function buildPresenterHTML(styleContent){
    return '<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>Presenter View</title><style>'+styleContent+'\n'+
      'body{display:grid;grid-template-columns:2fr 1fr;grid-template-rows:auto 1fr auto;gap:12px;padding:16px;height:100vh;background:#0e1116;color:#e6edf3;font-family:sans-serif;}'+
      '.pres-header{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1);}'+
      '.pres-timer{font-size:28px;font-family:monospace;color:#bc8cff;} .pres-counter{font-size:18px;color:rgba(255,255,255,.6);}'+
      '.pres-current{border:2px solid #bc8cff;border-radius:8px;overflow:hidden;display:grid;place-items:center;}'+
      '.pres-current .slide{position:relative;opacity:1;visibility:visible;transform:none;}'+
      '.pres-sidebar{display:flex;flex-direction:column;gap:12px;} .pres-next{border:1px solid rgba(255,255,255,.2);border-radius:8px;overflow:hidden;flex:0 0 auto;max-height:40%;display:grid;place-items:center;}'+
      '.pres-next .slide{position:relative;opacity:1;visibility:visible;transform:none;font-size:10px;}'+
      '.pres-next-label,.pres-notes-label{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:4px;}'+
      '.pres-notes{flex:1;overflow-y:auto;background:rgba(0,0,0,.3);border-radius:8px;padding:16px;font-size:15px;line-height:1.6;}'+
      '.pres-controls{grid-column:1/-1;display:flex;gap:8px;justify-content:center;padding:8px 0;border-top:1px solid rgba(255,255,255,.1);}'+
      '.pres-controls button{padding:6px 16px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#e6edf3;border-radius:4px;cursor:pointer;font-size:14px;}'+
      '</style></head><body>'+
      '<div class="pres-header"><span class="pres-counter" id="pc">1 / 1</span><span class="pres-timer" id="pt">00:00:00</span></div>'+
      '<div class="pres-current" id="pcur"></div>'+
      '<div class="pres-sidebar"><div><div class="pres-next-label">다음 슬라이드</div><div class="pres-next" id="pnext"></div></div>'+
      '<div style="flex:1;display:flex;flex-direction:column;"><div class="pres-notes-label">발표자 노트</div><div class="pres-notes" id="pnotes"></div></div></div>'+
      '<div class="pres-controls"><button onclick="nav(-1)">◀ 이전</button><button onclick="nav(1)">다음 ▶</button></div>'+
      '<script>var ch=new BroadcastChannel("presenter-sync");var t0=Date.now();'+
      'setInterval(function(){var e=Math.floor((Date.now()-t0)/1000);'+
      'function z(n){return String(n).padStart(2,"0");}'+
      'document.getElementById("pt").textContent=z(Math.floor(e/3600))+":"+z(Math.floor((e%3600)/60))+":"+z(e%60);},1000);'+
      'ch.onmessage=function(e){if(e.data.type==="slide-change"){'+
      'document.getElementById("pc").textContent=(e.data.index+1)+" / "+e.data.total;'+
      'document.getElementById("pcur").innerHTML=e.data.slideHTML;'+
      'document.getElementById("pnext").innerHTML=e.data.nextSlideHTML||"<div style=\\"padding:20px;color:rgba(255,255,255,0.3)\\">마지막</div>";'+
      'document.getElementById("pnotes").innerHTML=e.data.notes||"<span style=\\"color:rgba(255,255,255,0.3);font-style:italic\\">노트 없음</span>";}};'+
      'function nav(d){ch.postMessage({type:"navigate",index:d});}<\/script></body></html>';
  }
  function openPresenter(){
    const w=window.open('','presenter','width=1000,height=700');
    if(!w){ alert('팝업이 차단되었습니다. 팝업을 허용해 주세요.'); return; }
    const st=document.querySelector('style'); w.document.write(buildPresenterHTML(st?st.textContent:''));
    w.document.close(); setTimeout(syncPresenter, 300);
  }
  return {
    init:function(){
      slides=Array.prototype.slice.call(document.querySelectorAll('#stage .slide'));
      cur=0; animating=false; isOverview=false;
      slides.forEach(function(s,i){ s.setAttribute('aria-label','슬라이드 '+(i+1)+' / '+slides.length);
        if(i===0){ resetFrag(s); reveal(s); hl(s); } else resetFrag(s); });
      const h=location.hash.slice(1), idx=slides.findIndex(function(s){return s.id===h;});
      if(idx>0) show(idx);
      fit(); onResize=fit; window.addEventListener('resize',onResize);
      onKey=function(ev){
        if(MODE!=='slide') return;
        if(ev.target.tagName==='BUTTON'||ev.target.tagName==='A'||ev.target.isContentEditable) return;
        const help=document.getElementById('dHelp');
        if(help&&help.classList.contains('show')){ if(ev.key==='Escape'||ev.key==='?'){ help.classList.remove('show'); ev.preventDefault(); } return; }
        switch(ev.key){
          case 'ArrowRight': case 'ArrowDown': case ' ': case 'PageDown': ev.preventDefault(); onUserInput(); show(cur+1); break;
          case 'ArrowLeft': case 'ArrowUp': case 'PageUp': ev.preventDefault(); onUserInput(); show(cur-1); break;
          case 'Home': ev.preventDefault(); onUserInput(); show(0); break;
          case 'End': ev.preventDefault(); onUserInput(); show(slides.length-1); break;
          case 'f': case 'F': ev.preventDefault(); fsToggle(); break;
          case 'o': case 'O': ev.preventDefault(); overview(); break;
          case 'n': case 'N': ev.preventDefault(); toggleNotes(); break;
          case 's': case 'S': ev.preventDefault(); openPresenter(); break;
          case 'p': case 'P': ev.preventDefault(); toggleAuto(); break;
          case '?': ev.preventDefault(); if(help) help.classList.toggle('show'); break;
          case 'Escape': if(isOverview) overview(); else if(isNotesVisible) toggleNotes(); else if(document.fullscreenElement) document.exitFullscreen(); break;
        }
      };
      window.addEventListener('keydown',onKey);
      onPD=function(e){ pX=e.clientX; pY=e.clientY; };
      onPU=function(e){ if(MODE!=='slide'||isOverview) return; const dx=e.clientX-pX, dy=e.clientY-pY;
        if(Math.abs(dx)>50 && Math.abs(dy)<100){ onUserInput(); (dx<0?show(cur+1):show(cur-1)); } };
      document.addEventListener('pointerdown',onPD); document.addEventListener('pointerup',onPU);
      onHash=function(){ if(MODE!=='slide'||isOverview) return; const hh=location.hash.slice(1),
        k=slides.findIndex(function(s){return s.id===hh;}); if(k>=0&&k!==cur) show(k); };
      window.addEventListener('hashchange',onHash);
      const sc=document.querySelector('.slides');
      if(sc){ onSlidesClick=function(e){ if(!isOverview) return; const t=e.target.closest('.slide'); if(!t) return;
        const k=slides.indexOf(t); if(k!==-1){ overview(); show(k); } }; sc.addEventListener('click',onSlidesClick); }
      if(pchan){ pchan.onmessage=function(e){ if(e.data&&e.data.type==='navigate'){ const t=cur+e.data.index; if(t>=0&&t<slides.length){ onUserInput(); show(t); } } }; }
    },
    destroy:function(){
      if(onResize) window.removeEventListener('resize',onResize);
      if(onKey) window.removeEventListener('keydown',onKey);
      if(onPD) document.removeEventListener('pointerdown',onPD);
      if(onPU) document.removeEventListener('pointerup',onPU);
      if(onHash) window.removeEventListener('hashchange',onHash);
      stopAutoTimer(); autoOn=false; isNotesVisible=false;
      const np=document.getElementById('dNotes'); if(np) np.classList.remove('show');
      document.body.classList.remove('deck-overview'); isOverview=false;
    }
  };
})();
function renderDeck(){
  const stage = document.getElementById('stage');
  document.getElementById('detail').hidden = true;
  stage.className = 'deckwrap';
  stage.innerHTML = buildDeckHTML();
  DECK.init();
}

/* =========================================================================
   레퍼런스 모드
   ========================================================================= */
function renderReference(){
  const stage = document.getElementById('stage');
  document.getElementById('detail').hidden = true;
  stage.className = '';
  const nav = '<nav class="mono" style="position:sticky;top:0;align-self:start;'+
    'display:flex;flex-direction:column;gap:var(--xs);padding:var(--lg);'+
    'border-right:1px solid var(--line);min-width:200px;font-size:12px">'+
    SYSTEM.chapters.filter(function(c){return c.kind!=="title";}).map(function(c){
      return '<a href="#ch-'+c.id+'" style="color:var(--muted);text-decoration:none">'+c.title+'</a>';}).join('')+'</nav>';
  let inner='';
  SYSTEM.chapters.forEach(function(c){
    if(c.kind==="title") return;
    inner += '<h2 class="mono" id="ch-'+c.id+'" style="font-size:20px;margin-top:28px;color:var(--accent)">'+c.title+'</h2>';
    (c.slides||[]).forEach(function(s){
      if(s.t) inner += '<h3 class="mono" style="font-size:15px;color:var(--kafka);margin-top:14px">'+s.t+'</h3>';
      inner += (s.blocks||[]).map(renderBlock).join('');
    });
  });
  const body = '<div class="refdoc" style="padding:var(--xl);max-width:1040px;flex:1;min-width:0">'+inner+'</div>';
  stage.innerHTML = '<div style="display:flex;gap:var(--lg)">'+nav+body+'</div>';
}

/* =========================================================================
   모드 토글 + init
   ========================================================================= */
function setMode(m){
  MODE = m;
  document.getElementById('mode-btn').textContent = (m==="slide") ? "레퍼런스 모드" : "발표 모드";
  if(m==="slide"){ renderDeck(); } else { DECK.destroy(); renderReference(); }
}

function init(){
  renderEnvToggle();
  renderDeck();

  document.getElementById('mode-btn').addEventListener('click', function(){
    setMode(MODE==="slide" ? "ref" : "slide");
    this.blur();   // 포커스를 떼어 직후 키보드 네비가 막히지 않게
  });

  // 노드 클릭/Enter → 상세 패널 (위임 — 재렌더에도 #stage에 생존, 두 모드 공통)
  const stage = document.getElementById('stage');
  stage.addEventListener('click', function(ev){
    const g = ev.target.closest('.node'); if(g) showDetail(g.dataset.id);
  });
  stage.addEventListener('keydown', function(ev){
    if(ev.key==="Enter"){ const g=ev.target.closest('.node'); if(g) showDetail(g.dataset.id); }
  });
}
init();


</script>
