apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # prod 수동 sync 전용 로컬 계정. RBAC: g, gitops-admin, role:prod-deployer (rbac-cm.yaml)
  # 비밀번호는 설치 후 `argocd account update-password --account gitops-admin` 로 설정(시크릿 미커밋).
  #
  # ⚠️ 라이브 주의: bootstrap-argocd.sh 7/8 단계가 `kubectl apply -f argocd/bootstrap/` 로 이 파일을
  #    적용한다. ArgoCD 설치본이 이미 만든 argocd-cm 의 다른 data 키(url, resource exclusions 등)를
  #    덮어쓰지 않도록, 최초 적용 후 `kubectl get cm argocd-cm -n argocd -o yaml` 로 기존 키 보존 확인.
  #    기존 키가 사라졌으면 이 파일에 해당 키를 합쳐 다시 apply(또는 `kubectl patch` 로 accounts 키만 머지).
  accounts.gitops-admin: apiKey, login
