apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # NOTE: image-updater(namePattern "synapse-*-dev")가 이 이름과 매칭되지만 useAnnotations:true라
  # image-list 주석이 없으면 스킵됨. elasticsearch는 Elastic 공식 이미지(ECR semver 아님)이므로
  # argocd-image-updater.argoproj.io/* 주석을 절대 추가하지 말 것.
  name: synapse-elasticsearch-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: synapse
    app.kubernetes.io/component: elasticsearch
    environment: dev
spec:
  project: synapse
  source:
    repoURL: https://github.com/team-project-final/synapse-gitops.git
    targetRevision: main
    path: apps/elasticsearch/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: synapse-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
