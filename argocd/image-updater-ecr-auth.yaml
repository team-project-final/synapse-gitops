# Image Updater ECR 인증 (#122 — W5 clearance window 발견: registries 자격 미설정으로 ECR 태그 조회 실패).
# 권한: IRSA(synapse-dev-image-updater-role, AmazonEC2ContainerRegistryReadOnly) 이미 SA에 주입됨.
# 방식: ext 스크립트가 IRSA 자격으로 `aws ecr get-login-password` 토큰 발급. v0.15.2 이미지에 aws-cli 포함 확인.
# ecr-login.sh는 bring-up phase_image_updater에서 별도 볼륨(/app/scripts, mode 0555)으로 마운트.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater-config
    app.kubernetes.io/part-of: argocd-image-updater
data:
  log.level: info
  registries.conf: |
    registries:
      - name: ECR
        prefix: 963773969059.dkr.ecr.ap-northeast-2.amazonaws.com
        api_url: https://963773969059.dkr.ecr.ap-northeast-2.amazonaws.com
        ping: yes
        default: true
        credentials: ext:/app/scripts/ecr-login.sh
        credsexpire: 10h
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-ecr-auth
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd-image-updater
data:
  ecr-login.sh: |
    #!/bin/sh
    # IRSA 자격으로 ECR 토큰 발급 → argocd-image-updater ext 자격 포맷(username:password)
    # HOME=/tmp: aws-cli가 /app/.aws(read-only fs)에 캐시 쓰려다 [Errno 30] 실패하는 것 회피.
    export HOME=/tmp
    echo "AWS:$(aws ecr get-login-password --region ap-northeast-2)"
