apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: synapse-apps
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - service: platform-svc
                - service: engagement-svc
                - service: knowledge-svc
                - service: learning-card
                - service: learning-ai
                - service: gateway
          - list:
              elements:
                - env: dev
  template:
    metadata:
      name: "synapse-{{service}}-{{env}}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: synapse
        app.kubernetes.io/component: "{{service}}"
        environment: "{{env}}"
      annotations:
        argocd-image-updater.argoproj.io/image-list: "app=963773969059.dkr.ecr.ap-northeast-2.amazonaws.com/synapse/{{service}}"
        argocd-image-updater.argoproj.io/app.update-strategy: semver
        argocd-image-updater.argoproj.io/app.allow-tags: "regexp:^[0-9]+\\.[0-9]+\\.[0-9]+$"
        argocd-image-updater.argoproj.io/write-back-method: git
        argocd-image-updater.argoproj.io/write-back-target: kustomization
        # PR write-back (#126): main 직접 push(=Maintain bypass 의존) 대신 base:commit 분리 브랜치로 push.
        # ApplicationSet이 {{service}}를 치환 → 서비스별 write-branch(image-updater-<svc>). main은 보호 유지.
        # 이 브랜치 push → .github/workflows/image-updater-pr.yml 가 main으로 PR 자동 생성.
        argocd-image-updater.argoproj.io/git-branch: "main:image-updater-{{service}}"
    spec:
      project: synapse
      source:
        repoURL: https://github.com/team-project-final/synapse-gitops.git
        targetRevision: main
        path: "apps/{{service}}/overlays/{{env}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "synapse-{{env}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
