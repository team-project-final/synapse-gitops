apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: synapse-staging

patches:
  - target:
      kind: Deployment
      name: engagement-svc
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: ConfigMap
      name: engagement-svc-config
    patch: |
      - op: replace
        path: /data/LOG_LEVEL
        value: "INFO"
      - op: replace
        path: /data/SPRING_PROFILES_ACTIVE
        value: "staging"
      # Kafka 토픽 환경 프리픽스 (#199): dev·staging 공유 MSK 환경 교차 격리 — 앱이 모든 발행/구독 토픽명 앞에 붙인다.
      - op: add
        path: /data/KAFKA_TOPIC_PREFIX
        value: "staging."
      - op: add
        path: /data/DATABASE_HOST
        value: "synapse-staging-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com"
      - op: add
        path: /data/DATABASE_PORT
        value: "5432"
      - op: add
        path: /data/DATABASE_NAME
        value: "synapse_engagement"
      - op: add
        path: /data/REDIS_HOST
        value: "master.synapse-dev-redis.v6lpdh.apn2.cache.amazonaws.com"
      - op: add
        path: /data/REDIS_PORT
        value: "6379"
      - op: add
        path: /data/SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://synapse-staging-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com:5432/synapse_engagement"
      - op: add
        path: /data/SPRING_DATASOURCE_USERNAME
        value: "synapse_admin"

  - target:
      kind: ExternalSecret
      name: engagement-svc-external-secret
    patch: |
      - op: replace
        path: /spec/secretStoreRef/name
        value: aws-secrets-manager

images:
  - name: ghcr.io/team-project-final/synapse-engagement-svc
    newName: 963773969059.dkr.ecr.ap-northeast-2.amazonaws.com/synapse/engagement-svc
    # #191: engagement는 semver만 push(dev-latest 미생성) → ImagePullBackOff. ECR 실재 semver로 정정.
    # 1.0.1 = actuator health permitAll 수정(engagement#43, dev와 동일).
    newTag: 1.0.1
