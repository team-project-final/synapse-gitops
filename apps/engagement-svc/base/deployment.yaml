apiVersion: apps/v1
kind: Deployment
metadata:
  name: engagement-svc
  labels:
    app.kubernetes.io/name: engagement-svc
    app.kubernetes.io/part-of: synapse
spec:
  replicas: 1
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: engagement-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: engagement-svc
        app.kubernetes.io/part-of: synapse
    spec:
      terminationGracePeriodSeconds: 40
      containers:
        - name: engagement-svc
          image: ghcr.io/team-project-final/synapse-engagement-svc:latest
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "5"]
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-brokers
                  key: KAFKA_BROKERS
          envFrom:
            - configMapRef:
                name: engagement-svc-config
            - secretRef:
                name: engagement-svc-secret
                optional: true
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
