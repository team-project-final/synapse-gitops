apiVersion: apps/v1
kind: Deployment
metadata:
  name: engagement-svc
  labels:
    app.kubernetes.io/name: engagement-svc
    app.kubernetes.io/part-of: synapse
spec:
  replicas: 1
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: engagement-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: engagement-svc
        app.kubernetes.io/part-of: synapse
    spec:
      terminationGracePeriodSeconds: 40
      containers:
        - name: engagement-svc
          image: ghcr.io/team-project-final/synapse-engagement-svc:latest
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "5"]
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-brokers
                  key: KAFKA_BROKERS
            # 앱은 spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092} 를 읽음.
            # KAFKA_BROKERS만으론 localhost 폴백 → Kafka 단절. 동일 ConfigMap 값을 앱이 읽는 이름으로도 주입.
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-brokers
                  key: KAFKA_BROKERS
            # SPRING_KAFKA_BOOTSTRAP_SERVERS = spring.kafka.bootstrap-servers 정식 바인딩(일부 프로파일이 이 이름 사용)
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-brokers
                  key: KAFKA_BROKERS
          envFrom:
            - configMapRef:
                name: engagement-svc-config
            - secretRef:
                name: engagement-svc-secret
                optional: true
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 5
            failureThreshold: 60   # 최대 ~300s 기동 허용(콜드스타트·노드 경합). 성공 후 liveness 활성 (#164 동일)
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m      # #164: req 100m 스로틀로 콜드스타트가 startupProbe 예산 초과 → 250m로 기동 CPU 확보
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi  # Spring Boot OOM 헤드룸(learning-card와 동일 사이징)
          securityContext:
            runAsNonRoot: true
            runAsUser: 101    # 이미지의 app 유저(adduser → uid 101). runAsNonRoot 검증에 숫자 UID 필요
            runAsGroup: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
