apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: synapse-dev

patches:
  - target:
      kind: Deployment
      name: learning-ai
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: ConfigMap
      name: learning-ai-config
    patch: |
      - op: replace
        path: /data/LOG_LEVEL
        value: "DEBUG"

images:
  - name: ghcr.io/team-project-final/synapse-learning-ai
    newTag: dev-latest
