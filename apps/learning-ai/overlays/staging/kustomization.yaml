apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: synapse-staging

patches:
  - target:
      kind: Deployment
      name: learning-ai
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

images:
  - name: ghcr.io/team-project-final/synapse-learning-ai
    newTag: staging-latest
