apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - pdb.yaml
  - hpa.yaml
  - netpol.yaml

namespace: synapse-prod

# Python 서비스 — SPRING_PROFILES_ACTIVE 없음. DB는 LEARNING_AI_DATABASE_URL(asyncpg).
# learning-ai는 pgvector 사용 — ES/OpenSearch 미사용(GAP-5 정리 완료).
patches:
  - target:
      kind: Deployment
      name: learning-ai
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: ConfigMap
      name: learning-ai-config
    patch: |
      - op: replace
        path: /data/LOG_LEVEL
        value: "INFO"
      - op: add
        path: /data/DATABASE_HOST
        value: "synapse-dev-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com"
      - op: add
        path: /data/DATABASE_PORT
        value: "5432"
      - op: add
        path: /data/DATABASE_NAME
        value: "synapse_prod"
      - op: add
        path: /data/LEARNING_AI_DATABASE_URL
        value: "postgresql+asyncpg://synapse_admin@synapse-dev-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com:5432/synapse_prod"
      - op: add
        path: /data/LEARNING_AI_KAFKA_ENABLED
        value: "true"
      - op: add
        path: /data/LEARNING_AI_SCHEMA_REGISTRY_URL
        value: "http://schema-registry:8081"
      # prod MSK는 TLS 전용 리스너(client_broker=TLS, 9094). aiokafka 클라이언트가
      # SSL로 핸드셰이크하도록 지정(미설정 시 PLAINTEXT 기본→TLS 브로커 연결 실패).
      # MSK 인증서는 Amazon Trust Services 발급→JDK/Python 기본 truststore로 충분.
      - op: add
        path: /data/LEARNING_AI_KAFKA_SECURITY_PROTOCOL
        value: "SSL"
  - target:
      kind: ExternalSecret
      name: learning-ai-external-secret
    patch: |
      - op: replace
        path: /spec/secretStoreRef/name
        value: aws-secrets-manager
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: synapse/prod/learning-ai/openai-api-key
      - op: replace
        path: /spec/data/1/remoteRef/key
        value: synapse/prod/learning-ai/db-password
  - target:
      kind: Deployment
      name: learning-ai
    patch: |
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: learning-ai
                  topologyKey: kubernetes.io/hostname

images:
  - name: ghcr.io/team-project-final/synapse-learning-ai
    newName: 963773969059.dkr.ecr.ap-northeast-2.amazonaws.com/synapse/learning-ai
    newTag: prod-latest
