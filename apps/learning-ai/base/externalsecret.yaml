apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: learning-ai-external-secret
  labels:
    app.kubernetes.io/name: learning-ai
    app.kubernetes.io/part-of: synapse
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: TO_BE_PATCHED
    kind: ClusterSecretStore
  target:
    name: learning-ai-secret
    creationPolicy: Owner
  data:
    # learning-ai는 pydantic env_prefix="LEARNING_AI_" 를 쓰므로 env 키에 prefix 필수.
    # (secretKey가 곧 컨테이너 env 변수명. OPENAI_API_KEY로 주면 앱이 못 읽어 기동 실패)
    - secretKey: LEARNING_AI_OPENAI_API_KEY
      remoteRef:
        key: synapse/dev/learning-ai/openai-api-key
    - secretKey: DATABASE_PASSWORD
      remoteRef:
        key: synapse/dev/learning-ai/db-password
