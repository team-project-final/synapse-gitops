apiVersion: apps/v1
kind: Deployment
metadata:
  name: learning-ai
  labels:
    app.kubernetes.io/name: learning-ai
    app.kubernetes.io/part-of: synapse
spec:
  replicas: 1
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: learning-ai
  template:
    metadata:
      labels:
        app.kubernetes.io/name: learning-ai
        app.kubernetes.io/part-of: synapse
    spec:
      terminationGracePeriodSeconds: 40
      containers:
        - name: learning-ai
          image: ghcr.io/team-project-final/synapse-learning-ai:latest
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "5"]
          ports:
            - containerPort: 8090
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-brokers
                  key: KAFKA_BROKERS
          envFrom:
            - configMapRef:
                name: learning-ai-config
            - secretRef:
                name: learning-ai-secret
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # 이미지가 USER 미지정(root)이라 runAsNonRoot는 적용 불가(앱 레포 Dockerfile에 USER 추가 후 활성화 권장).
          # 그 전까지 안전한 항목만: 권한상승 차단 + 모든 capability drop + seccomp 기본.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
