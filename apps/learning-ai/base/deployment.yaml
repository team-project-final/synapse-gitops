apiVersion: apps/v1
kind: Deployment
metadata:
  name: learning-ai
  labels:
    app.kubernetes.io/name: learning-ai
    app.kubernetes.io/part-of: synapse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: learning-ai
  template:
    metadata:
      labels:
        app.kubernetes.io/name: learning-ai
        app.kubernetes.io/part-of: synapse
    spec:
      containers:
        - name: learning-ai
          image: ghcr.io/team-project-final/synapse-learning-ai:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: learning-ai-config
            - secretRef:
                name: learning-ai-secret
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
