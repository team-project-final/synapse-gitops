apiVersion: apps/v1
kind: Deployment
metadata:
  name: learning-ai
  labels:
    app.kubernetes.io/name: learning-ai
    app.kubernetes.io/part-of: synapse
spec:
  replicas: 1
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: learning-ai
  template:
    metadata:
      labels:
        app.kubernetes.io/name: learning-ai
        app.kubernetes.io/part-of: synapse
    spec:
      terminationGracePeriodSeconds: 40
      containers:
        - name: learning-ai
          image: ghcr.io/team-project-final/synapse-learning-ai:latest
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "5"]
          ports:
            - containerPort: 8090
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-brokers
                  key: KAFKA_BROKERS
            # learning-ai(pydantic env_prefix="LEARNING_AI_")는 LEARNING_AI_KAFKA_BOOTSTRAP_SERVERS 를 읽음.
            # prefix 없는 KAFKA_BROKERS만 주면 localhost:9092로 폴백해 KafkaConnectionError로 기동 실패.
            - name: LEARNING_AI_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-brokers
                  key: KAFKA_BROKERS
          envFrom:
            - configMapRef:
                name: learning-ai-config
            - secretRef:
                name: learning-ai-secret
                optional: true
          startupProbe:
            tcpSocket:
              port: 8090
            periodSeconds: 5
            failureThreshold: 24   # 최대 ~120s 기동 허용
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 101    # 이미지의 app 유저(adduser → uid 101). runAsNonRoot 검증에 숫자 UID 필요
            runAsGroup: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
