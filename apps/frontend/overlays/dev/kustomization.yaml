apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: synapse-dev
patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
images:
  - name: ghcr.io/team-project-final/synapse-frontend
    newName: 963773969059.dkr.ecr.ap-northeast-2.amazonaws.com/synapse/frontend
    # Phase D: dev Image Updater uses semver, so the live tag must stay semver.
    newTag: 1.0.0
