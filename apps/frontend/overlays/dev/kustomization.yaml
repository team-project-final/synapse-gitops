apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: synapse-dev
patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
images:
  - name: ghcr.io/team-project-final/synapse-frontend
    newName: 963773969059.dkr.ecr.ap-northeast-2.amazonaws.com/synapse/frontend
    # image-updater A안: semver update-strategy 호환 위해 semver 베이스라인으로 핀 (was e4532fee…SHA).
    # ECR에 1.0.0 태그 존재 필요 — 다음 라이브 윈도우에서 SHA→1.0.0 재태그
    # (aws ecr batch-get-image | put-image, 동일 digest) 선결. 미선결 시 sync 후 ImagePullBackOff.
    newTag: 1.0.0
