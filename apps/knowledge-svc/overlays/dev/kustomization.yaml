apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: synapse-dev
patches:
  - target:
      kind: Deployment
      name: knowledge-svc
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: ConfigMap
      name: knowledge-svc-config
    patch: |
      - op: replace
        path: /data/LOG_LEVEL
        value: "DEBUG"
      - op: replace
        path: /data/SPRING_PROFILES_ACTIVE
        value: "dev"
      - op: add
        path: /data/DATABASE_HOST
        value: "synapse-dev-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com"
      - op: add
        path: /data/DATABASE_PORT
        value: "5432"
      - op: add
        path: /data/DATABASE_NAME
        value: "synapse_knowledge"
      - op: add
        path: /data/ELASTICSEARCH_URIS
        value: "http://elasticsearch:9200"
      - op: add
        path: /data/SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://synapse-dev-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com:5432/synapse_knowledge"
      - op: add
        path: /data/SPRING_DATASOURCE_USERNAME
        value: "synapse_admin"
      - op: add
        path: /data/KAFKA_ENABLED
        value: "true"
      - op: add
        path: /data/SCHEMA_REGISTRY_URL
        value: "http://schema-registry:8081"
      # dev MSKлҠ” TLS м „мҡ© лҰ¬мҠӨл„Ҳ(client_broker=TLS, 9094). Spring Kafka нҒҙлқјмқҙм–ёнҠёк°Җ
      # SSLлЎң н•ёл“ңм…°мқҙнҒ¬н•ҳлҸ„лЎқ м§Җм •(лҜём„Өм • мӢң PLAINTEXT кё°ліёвҶ’TLS лёҢлЎңм»Ө м—°кІ° мӢӨнҢЁ).
      # MSK мқёмҰқм„ңлҠ” Amazon Trust Services л°ңкёүвҶ’JDK кё°ліё truststoreлЎң м¶©л¶„.
      - op: add
        path: /data/SPRING_KAFKA_SECURITY_PROTOCOL
        value: "SSL"
      # кІҖмғү мқёлҚұм„ң idempotency store(Redis) вҖ” лҜём„Өм • мӢң localhost:6379 нҸҙл°ұ вҶ’ м „ л ҲмҪ”л“ң DLQн–ү (#198).
      # ElastiCache transit_encryption=true вҶ’ SSL н•„мҲҳ. мқёмҠӨн„ҙмҠӨлҠ” platformкіј кіөмң .
      - op: add
        path: /data/SPRING_DATA_REDIS_HOST
        value: "master.synapse-dev-redis.v6lpdh.apn2.cache.amazonaws.com"
      - op: add
        path: /data/SPRING_DATA_REDIS_PORT
        value: "6379"
      - op: add
        path: /data/SPRING_DATA_REDIS_SSL_ENABLED
        value: "true"
      # мІӯнӮ№/мһ„лІ л”© AI нҒҙлқјмқҙм–ёнҠё вҖ” лҜём„Өм • мӢң localhost:8090 нҸҙл°ұ(Connection refused) (#198).
      - op: add
        path: /data/SEARCH_AI_BASE_URL
        value: "http://learning-ai"
  - target:
      kind: ExternalSecret
      name: knowledge-svc-external-secret
    patch: |
      - op: replace
        path: /spec/secretStoreRef/name
        value: aws-secrets-manager
images:
  - name: ghcr.io/team-project-final/synapse-knowledge-svc
    newName: 963773969059.dkr.ecr.ap-northeast-2.amazonaws.com/synapse/knowledge-svc
    # image-updater Aм•Ҳ: semver update-strategy нҳёнҷҳ мң„н•ҙ semver лІ мқҙмҠӨлқјмқёмңјлЎң н•Җ (was dev-latest).
    # ECRм—җ 1.0.0 нғңк·ё мЎҙмһ¬ н•„мҡ” вҖ” лӢӨмқҢ лқјмқҙлёҢ мңҲлҸ„мҡ°м—җм„ң кё°мЎҙ нғңк·ёвҶ’1.0.0 мһ¬нғңк·ё
    # (aws ecr batch-get-image | put-image, лҸҷмқј digest) м„ кІ°. лҜём„ кІ° мӢң sync нӣ„ ImagePullBackOff.
    newTag: a56e7d3a353c33cc3d751d76a0f4f3f1d4e02cdf
