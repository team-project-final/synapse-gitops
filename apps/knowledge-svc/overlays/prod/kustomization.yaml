apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - pdb.yaml
  - hpa.yaml
  - netpol.yaml

namespace: synapse-prod

# Elasticsearch는 인클러스터 StatefulSet(FS-C 배포 예정) — prod도 동일 네임스페이스 9200 접근.
patches:
  - target:
      kind: Deployment
      name: knowledge-svc
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: ConfigMap
      name: knowledge-svc-config
    patch: |
      - op: replace
        path: /data/LOG_LEVEL
        value: "INFO"
      - op: replace
        path: /data/SPRING_PROFILES_ACTIVE
        value: "prod"
      - op: add
        path: /data/DATABASE_HOST
        value: "synapse-dev-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com"
      - op: add
        path: /data/DATABASE_PORT
        value: "5432"
      - op: add
        path: /data/DATABASE_NAME
        value: "synapse_prod"
      - op: add
        path: /data/ELASTICSEARCH_URIS
        value: "http://elasticsearch:9200"
      - op: add
        path: /data/SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://synapse-dev-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com:5432/synapse_prod"
      - op: add
        path: /data/SPRING_DATASOURCE_USERNAME
        value: "synapse_admin"
      - op: add
        path: /data/KAFKA_ENABLED
        value: "true"
      - op: add
        path: /data/SCHEMA_REGISTRY_URL
        value: "http://schema-registry:8081"
      # prod MSK는 TLS 전용 리스너(client_broker=TLS, 9094). Spring Kafka 클라이언트가
      # SSL로 핸드셰이크하도록 지정(미설정 시 PLAINTEXT 기본→TLS 브로커 연결 실패).
      # MSK 인증서는 Amazon Trust Services 발급→JDK 기본 truststore로 충분.
      - op: add
        path: /data/SPRING_KAFKA_SECURITY_PROTOCOL
        value: "SSL"
      # 검색 인덱서 idempotency store(Redis) (#198). 단일 ElastiCache 공유 — prod는 platform prod와
      # 동일하게 DATABASE=1로 논리 분리(dev/staging=기본 0).
      - op: add
        path: /data/SPRING_DATA_REDIS_HOST
        value: "master.synapse-dev-redis.v6lpdh.apn2.cache.amazonaws.com"
      - op: add
        path: /data/SPRING_DATA_REDIS_PORT
        value: "6379"
      - op: add
        path: /data/SPRING_DATA_REDIS_SSL_ENABLED
        value: "true"
      - op: add
        path: /data/SPRING_DATA_REDIS_DATABASE
        value: "1"
      # 청킹/임베딩 AI 클라이언트 — 미설정 시 localhost:8090 폴백 (#198).
      - op: add
        path: /data/SEARCH_AI_BASE_URL
        value: "http://learning-ai"
  - target:
      kind: ExternalSecret
      name: knowledge-svc-external-secret
    patch: |
      - op: replace
        path: /spec/secretStoreRef/name
        value: aws-secrets-manager
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: synapse/prod/knowledge-svc/db-password
      - op: replace
        path: /spec/data/1/remoteRef/key
        value: synapse/prod/knowledge-svc/s3-access-key
      - op: replace
        path: /spec/data/2/remoteRef/key
        value: synapse/prod/platform-svc/jwt-public-key
      - op: replace
        path: /spec/data/3/remoteRef/key
        value: synapse/prod/platform-svc/redis-auth-token
  - target:
      kind: Deployment
      name: knowledge-svc
    patch: |
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: knowledge-svc
                  topologyKey: kubernetes.io/hostname

images:
  - name: ghcr.io/team-project-final/synapse-knowledge-svc
    newName: 963773969059.dkr.ecr.ap-northeast-2.amazonaws.com/synapse/knowledge-svc
    newTag: prod-latest
