apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: synapse-prod

patches:
  - target:
      kind: Deployment
      name: knowledge-svc
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3

images:
  - name: ghcr.io/team-project-final/synapse-knowledge-svc
    newTag: prod-latest
