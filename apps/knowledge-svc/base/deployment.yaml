apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-svc
  labels:
    app.kubernetes.io/name: knowledge-svc
    app.kubernetes.io/part-of: synapse
spec:
  replicas: 1
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: knowledge-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: knowledge-svc
        app.kubernetes.io/part-of: synapse
    spec:
      terminationGracePeriodSeconds: 40
      containers:
        - name: knowledge-svc
          image: ghcr.io/team-project-final/synapse-knowledge-svc:latest
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "5"]
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-brokers
                  key: KAFKA_BROKERS
            # 앱은 spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092} 를 읽음(prod는 기본값 없음).
            # KAFKA_BROKERS만으론 localhost 폴백/빈값 → Kafka 단절. 동일 값을 앱이 읽는 이름으로도 주입.
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-brokers
                  key: KAFKA_BROKERS
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-brokers
                  key: KAFKA_BROKERS
          envFrom:
            - configMapRef:
                name: knowledge-svc-config
            - secretRef:
                name: knowledge-svc-secret
                optional: true
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
