apiVersion: apps/v1
kind: Deployment
metadata:
  name: learning-card
  labels:
    app.kubernetes.io/name: learning-card
    app.kubernetes.io/part-of: synapse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: learning-card
  template:
    metadata:
      labels:
        app.kubernetes.io/name: learning-card
        app.kubernetes.io/part-of: synapse
    spec:
      containers:
        - name: learning-card
          image: ghcr.io/team-project-final/synapse-learning-card:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: learning-card-config
            - secretRef:
                name: learning-card-secret
                optional: true
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
