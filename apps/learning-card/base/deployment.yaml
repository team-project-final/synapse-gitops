apiVersion: apps/v1
kind: Deployment
metadata:
  name: learning-card
  labels:
    app.kubernetes.io/name: learning-card
    app.kubernetes.io/part-of: synapse
spec:
  replicas: 1
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: learning-card
  template:
    metadata:
      labels:
        app.kubernetes.io/name: learning-card
        app.kubernetes.io/part-of: synapse
    spec:
      terminationGracePeriodSeconds: 40
      containers:
        - name: learning-card
          image: ghcr.io/team-project-final/synapse-learning-card:latest
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "5"]
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-brokers
                  key: KAFKA_BROKERS
            # 앱 기본 프로파일은 ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}, prod는 ${SPRING_KAFKA_BOOTSTRAP_SERVERS} 를 읽음.
            # KAFKA_BROKERS만으론 localhost 폴백/빈값 → Kafka 단절. 두 이름 모두 동일 값으로 주입.
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-brokers
                  key: KAFKA_BROKERS
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-brokers
                  key: KAFKA_BROKERS
          envFrom:
            - configMapRef:
                name: learning-card-config
            - secretRef:
                name: learning-card-secret
                optional: true
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
