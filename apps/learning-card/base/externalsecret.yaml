apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: learning-card-external-secret
  labels:
    app.kubernetes.io/name: learning-card
    app.kubernetes.io/part-of: synapse
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: TO_BE_PATCHED
    kind: ClusterSecretStore
  target:
    name: learning-card-secret
    creationPolicy: Owner
  data:
    - secretKey: API_KEY
      remoteRef:
        key: synapse/dev/learning-card/api-key
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: synapse/dev/knowledge-svc/db-password
    # synapse.jwt.public-key — 미주입 시 SecurityConfig가 ephemeral 키 폴백 → 실토큰 전부 401 (#196).
    # 서명 주체(platform-svc) 공개키를 단일 출처로 참조.
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: synapse/dev/platform-svc/jwt-public-key
