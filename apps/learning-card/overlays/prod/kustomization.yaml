apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - pdb.yaml
  - hpa.yaml
  - netpol.yaml

namespace: synapse-prod

# вҡ пёҸ base ExternalSecret data[1](SPRING_DATASOURCE_PASSWORD)лҠ” synapse/.../knowledge-svc/db-password м°ёмЎ°.
#    кіөмң  RDS(synapse_admin) кіөнҶө л№„л°ҖлІҲнҳё кіөмң лЎң к°„мЈј вҶ’ prodлҸ„ knowledge-svc кІҪлЎң мң м§Җ. лІ„к·ёл©ҙ base м„ мҲҳм • н•„мҡ”.
patches:
  - target:
      kind: Deployment
      name: learning-card
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: ConfigMap
      name: learning-card-config
    patch: |
      - op: replace
        path: /data/LOG_LEVEL
        value: "INFO"
      - op: replace
        path: /data/SPRING_PROFILES_ACTIVE
        value: "prod"
      - op: add
        path: /data/DATABASE_HOST
        value: "synapse-dev-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com"
      - op: add
        path: /data/DATABASE_PORT
        value: "5432"
      - op: add
        path: /data/DATABASE_NAME
        value: "synapse_prod"
      - op: add
        path: /data/SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://synapse-dev-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com:5432/synapse_prod"
      - op: add
        path: /data/SPRING_DATASOURCE_USERNAME
        value: "synapse_admin"
      - op: add
        path: /data/KAFKA_ENABLED
        value: "true"
      - op: add
        path: /data/SCHEMA_REGISTRY_URL
        value: "http://schema-registry:8081"
      # prod MSKлҠ” TLS м „мҡ© лҰ¬мҠӨл„Ҳ(client_broker=TLS, 9094). Spring Kafka нҒҙлқјмқҙм–ёнҠёк°Җ
      # SSLлЎң н•ёл“ңм…°мқҙнҒ¬н•ҳлҸ„лЎқ м§Җм •(лҜём„Өм • мӢң PLAINTEXT кё°ліёвҶ’TLS лёҢлЎңм»Ө м—°кІ° мӢӨнҢЁ).
      # MSK мқёмҰқм„ңлҠ” Amazon Trust Services л°ңкёүвҶ’JDK кё°ліё truststoreлЎң м¶©л¶„.
      - op: add
        path: /data/SPRING_KAFKA_SECURITY_PROTOCOL
        value: "SSL"
  - target:
      kind: ExternalSecret
      name: learning-card-external-secret
    patch: |
      - op: replace
        path: /spec/secretStoreRef/name
        value: aws-secrets-manager
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: synapse/prod/learning-card/api-key
      - op: replace
        path: /spec/data/1/remoteRef/key
        value: synapse/prod/knowledge-svc/db-password
  - target:
      kind: Deployment
      name: learning-card
    patch: |
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: learning-card
                  topologyKey: kubernetes.io/hostname

images:
  - name: ghcr.io/team-project-final/synapse-learning-card
    newName: 963773969059.dkr.ecr.ap-northeast-2.amazonaws.com/synapse/learning-card
    newTag: prod-latest
