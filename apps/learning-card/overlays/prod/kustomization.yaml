apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - pdb.yaml
  - hpa.yaml
  - netpol.yaml

namespace: synapse-prod

# ⚠️ base ExternalSecret data[1](SPRING_DATASOURCE_PASSWORD)는 synapse/.../knowledge-svc/db-password 참조.
#    공유 RDS(synapse_admin) 공통 비밀번호 공유로 간주 → prod도 knowledge-svc 경로 유지. 버그면 base 선수정 필요.
patches:
  - target:
      kind: Deployment
      name: learning-card
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: ConfigMap
      name: learning-card-config
    patch: |
      - op: replace
        path: /data/LOG_LEVEL
        value: "INFO"
      - op: replace
        path: /data/SPRING_PROFILES_ACTIVE
        value: "prod"
      # Kafka 토픽 환경 프리픽스 (#199): dev·staging 공유 MSK 환경 교차 격리 — 앱이 모든 발행/구독 토픽명 앞에 붙인다.
      - op: add
        path: /data/KAFKA_TOPIC_PREFIX
        value: "prod."
      - op: add
        path: /data/DATABASE_HOST
        value: "synapse-dev-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com"
      - op: add
        path: /data/DATABASE_PORT
        value: "5432"
      - op: add
        path: /data/DATABASE_NAME
        value: "synapse_prod"
      - op: add
        path: /data/SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://synapse-dev-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com:5432/synapse_prod"
      - op: add
        path: /data/SPRING_DATASOURCE_USERNAME
        value: "synapse_admin"
      - op: add
        path: /data/KAFKA_ENABLED
        value: "true"
      - op: add
        path: /data/SCHEMA_REGISTRY_URL
        value: "http://schema-registry:8081"
      # prod MSK는 TLS 전용 리스너(client_broker=TLS, 9094). Spring Kafka 클라이언트가
      # SSL로 핸드셰이크하도록 지정(미설정 시 PLAINTEXT 기본→TLS 브로커 연결 실패).
      # MSK 인증서는 Amazon Trust Services 발급→JDK 기본 truststore로 충분.
      - op: add
        path: /data/SPRING_KAFKA_SECURITY_PROTOCOL
        value: "SSL"
  - target:
      kind: ExternalSecret
      name: learning-card-external-secret
    patch: |
      - op: replace
        path: /spec/secretStoreRef/name
        value: aws-secrets-manager
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: synapse/prod/learning-card/api-key
      - op: replace
        path: /spec/data/1/remoteRef/key
        value: synapse/prod/knowledge-svc/db-password
      - op: replace
        path: /spec/data/2/remoteRef/key
        value: synapse/prod/platform-svc/jwt-public-key
  - target:
      kind: Deployment
      name: learning-card
    patch: |
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: learning-card
                  topologyKey: kubernetes.io/hostname

images:
  - name: ghcr.io/team-project-final/synapse-learning-card
    newName: 963773969059.dkr.ecr.ap-northeast-2.amazonaws.com/synapse/learning-card
    newTag: prod-latest
