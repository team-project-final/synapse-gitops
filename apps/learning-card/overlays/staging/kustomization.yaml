apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: synapse-staging

patches:
  - target:
      kind: Deployment
      name: learning-card
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: ConfigMap
      name: learning-card-config
    patch: |
      - op: replace
        path: /data/LOG_LEVEL
        value: "INFO"
      - op: replace
        path: /data/SPRING_PROFILES_ACTIVE
        value: "staging"
      - op: add
        path: /data/DATABASE_HOST
        value: "synapse-staging-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com"
      - op: add
        path: /data/DATABASE_PORT
        value: "5432"
      - op: add
        path: /data/DATABASE_NAME
        value: "synapse_learning"
      - op: add
        path: /data/SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://synapse-staging-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com:5432/synapse_learning"
      - op: add
        path: /data/SPRING_DATASOURCE_USERNAME
        value: "synapse_admin"
      - op: add
        path: /data/KAFKA_ENABLED
        value: "true"
      - op: add
        path: /data/SCHEMA_REGISTRY_URL
        value: "http://schema-registry:8081"
      # staging MSK는 TLS 전용 리스너(client_broker=TLS, 9094). Spring Kafka 클라이언트가
      # SSL로 핸드셰이크하도록 지정(미설정 시 PLAINTEXT 기본→TLS 브로커 연결 실패).
      # MSK 인증서는 Amazon Trust Services 발급→JDK 기본 truststore로 충분.
      - op: add
        path: /data/SPRING_KAFKA_SECURITY_PROTOCOL
        value: "SSL"

  - target:
      kind: ExternalSecret
      name: learning-card-external-secret
    patch: |
      - op: replace
        path: /spec/secretStoreRef/name
        value: aws-secrets-manager

images:
  - name: ghcr.io/team-project-final/synapse-learning-card
    newName: 963773969059.dkr.ecr.ap-northeast-2.amazonaws.com/synapse/learning-card
    # #164: mutable dev-latest(dev와 다른 빌드 가능=조사 1차 가설) → 결정적 SHA 핀.
    # staging은 IU 대상 아님(image-updater namePattern=synapse-*-dev). SHA 일괄 재정렬은 #165 전략 결정 후.
    # #191: 기존 ab67c3c2 SHA가 ECR에 미존재(미빌드) → ImagePullBackOff. dev와 동일한 ECR 실재 SHA로 정정.
    newTag: e5e27ee2c37c5e9eea6f931cf702439e2e2d0d4a
