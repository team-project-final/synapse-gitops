apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/part-of: synapse
spec:
  # headless: StatefulSet governing service (serviceName: elasticsearch)
  # DNS: elasticsearch.<namespace>.svc.cluster.local → pod IP directly.
  # Single-replica dev 환경에서 http://elasticsearch:9200 으로 접근 가능.
  clusterIP: None
  ports:
    - name: http
      port: 9200
      targetPort: 9200
      protocol: TCP
  selector:
    app.kubernetes.io/name: elasticsearch
