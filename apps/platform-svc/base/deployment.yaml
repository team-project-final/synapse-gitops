apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-svc
  labels:
    app.kubernetes.io/name: platform-svc
    app.kubernetes.io/part-of: synapse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-svc
        app.kubernetes.io/part-of: synapse
    spec:
      containers:
        - name: platform-svc
          image: ghcr.io/team-project-final/synapse-platform-svc:latest
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-brokers
                  key: KAFKA_BROKERS
          envFrom:
            - configMapRef:
                name: platform-svc-config
            - secretRef:
                name: platform-svc-secret
                optional: true
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
