apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-svc
  labels:
    app.kubernetes.io/name: platform-svc
    app.kubernetes.io/part-of: synapse
spec:
  replicas: 1
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-svc
        app.kubernetes.io/part-of: synapse
    spec:
      terminationGracePeriodSeconds: 40
      containers:
        - name: platform-svc
          image: ghcr.io/team-project-final/synapse-platform-svc:latest
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "5"]
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-brokers
                  key: KAFKA_BROKERS
          envFrom:
            - configMapRef:
                name: platform-svc-config
            - secretRef:
                name: platform-svc-secret
                optional: true
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 5
            failureThreshold: 30   # 최대 ~150s 기동 허용(JVM 콜드스타트). 성공 후 liveness 활성
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # 이미지가 USER app(non-root)으로 빌드됨 → 컨테이너 보안 컨텍스트 강화(PodSecurity restricted 대응)
          securityContext:
            runAsNonRoot: true
            runAsUser: 101    # 이미지의 app 유저(adduser --system → uid 101). runAsNonRoot 검증에 숫자 UID 필요
            runAsGroup: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
