apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-svc-external-secret
  labels:
    app.kubernetes.io/name: platform-svc
    app.kubernetes.io/part-of: synapse
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: TO_BE_PATCHED
    kind: ClusterSecretStore
  target:
    name: platform-svc-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: synapse/dev/platform-svc/db-password
    # ElastiCache AUTH 토큰 (auth_token, infra/aws/dev/redis.tf). 앱이 spring.data.redis.password 로 읽음.
    # ⚠️ 머지 전 이 SM 시크릿을 생성해야 함(미존재 시 ExternalSecret 동기화 실패 → platform-svc-secret 전체 영향).
    - secretKey: SPRING_DATA_REDIS_PASSWORD
      remoteRef:
        key: synapse/dev/platform-svc/redis-auth-token
    - secretKey: JWT_SECRET
      remoteRef:
        key: synapse/dev/platform-svc/jwt-secret
    - secretKey: AES_SECRET_KEY
      remoteRef:
        key: synapse/dev/platform-svc/aes-secret-key
    - secretKey: JWT_PRIVATE_KEY
      remoteRef:
        key: synapse/dev/platform-svc/jwt-private-key
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: synapse/dev/platform-svc/jwt-public-key
    - secretKey: STRIPE_API_KEY
      remoteRef:
        key: synapse/dev/platform-svc/stripe-api-key
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: synapse/dev/platform-svc/stripe-webhook-secret
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: synapse/dev/platform-svc/google-client-id
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: synapse/dev/platform-svc/google-client-secret
    - secretKey: GITHUB_CLIENT_ID
      remoteRef:
        key: synapse/dev/platform-svc/github-client-id
    - secretKey: GITHUB_CLIENT_SECRET
      remoteRef:
        key: synapse/dev/platform-svc/github-client-secret
    - secretKey: APPLE_CLIENT_ID
      remoteRef:
        key: synapse/dev/platform-svc/apple-client-id
    - secretKey: APPLE_CLIENT_SECRET
      remoteRef:
        key: synapse/dev/platform-svc/apple-client-secret
