apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: synapse-staging

patches:
  - target:
      kind: Deployment
      name: platform-svc
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: ConfigMap
      name: platform-svc-config
    patch: |
      - op: replace
        path: /data/LOG_LEVEL
        value: "INFO"
      - op: replace
        path: /data/SPRING_PROFILES_ACTIVE
        value: "staging"
      - op: add
        path: /data/DATABASE_HOST
        value: "synapse-dev-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com"
      - op: add
        path: /data/DATABASE_PORT
        value: "5432"
      - op: add
        path: /data/DATABASE_NAME
        value: "synapse"
      # 앱은 spring.data.redis.* 만 읽음 → relaxed-binding 키 사용 (REDIS_HOST/PORT 는 무시됨)
      - op: add
        path: /data/SPRING_DATA_REDIS_HOST
        value: "master.synapse-dev-redis.v6lpdh.apn2.cache.amazonaws.com"
      - op: add
        path: /data/SPRING_DATA_REDIS_PORT
        value: "6379"
      # ElastiCache transit_encryption_enabled=true (infra/aws/dev/redis.tf) → TLS 필수
      - op: add
        path: /data/SPRING_DATA_REDIS_SSL_ENABLED
        value: "true"
      - op: add
        path: /data/DB_URL
        value: "jdbc:postgresql://synapse-dev-postgres.c7emuq20mhyy.ap-northeast-2.rds.amazonaws.com:5432/synapse"
      - op: add
        path: /data/DB_USERNAME
        value: "synapse_admin"
      - op: add
        path: /data/STRIPE_PRO_PRICE_ID
        value: "price_dev_pro_placeholder"
      - op: add
        path: /data/STRIPE_TEAM_PRICE_ID
        value: "price_dev_team_placeholder"
      - op: add
        path: /data/STRIPE_ENTERPRISE_PRICE_ID
        value: "price_dev_enterprise_placeholder"
      - op: add
        path: /data/KAFKA_ENABLED
        value: "true"
      - op: add
        path: /data/SCHEMA_REGISTRY_URL
        value: "http://schema-registry:8081"
      # staging MSK는 TLS 전용 리스너(client_broker=TLS, 9094). Spring Kafka 클라이언트가
      # SSL로 핸드셰이크하도록 지정(미설정 시 PLAINTEXT 기본→TLS 브로커 연결 실패).
      # MSK 인증서는 Amazon Trust Services 발급→JDK 기본 truststore로 충분.
      - op: add
        path: /data/SPRING_KAFKA_SECURITY_PROTOCOL
        value: "SSL"

  - target:
      kind: ExternalSecret
      name: platform-svc-external-secret
    patch: |
      - op: replace
        path: /spec/secretStoreRef/name
        value: aws-secrets-manager

images:
  - name: ghcr.io/team-project-final/synapse-platform-svc
    newName: 963773969059.dkr.ecr.ap-northeast-2.amazonaws.com/synapse/platform-svc
    newTag: dev-latest
