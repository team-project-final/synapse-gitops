apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: platform-svc-hpa
  labels:
    app.kubernetes.io/name: platform-svc
    app.kubernetes.io/part-of: synapse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: platform-svc
  minReplicas: 3
  maxReplicas: 6
  # JVM은 heap을 점유해 memory HPA가 항상 켜진 상태가 되기 쉬움 → CPU 기준만 사용
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
