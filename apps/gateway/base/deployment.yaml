apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: synapse
spec:
  replicas: 1
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/part-of: synapse
    spec:
      terminationGracePeriodSeconds: 40
      containers:
        - name: gateway
          image: ghcr.io/team-project-final/synapse-gateway:latest
          lifecycle:
            # gateway는 인그레스 진입점 — 엔드포인트 디레지스터 전파에 다른 svc(5s)보다 긴 드레인(10s) 부여
            preStop:
              exec:
                command: ["/bin/sleep", "10"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: gateway-config
            - secretRef:
                name: gateway-secret
                optional: true
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 5
            failureThreshold: 30   # 최대 ~150s 기동 허용(JVM 콜드스타트). 성공 후 liveness 활성
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 101    # 이미지의 app 유저(adduser → uid 101). runAsNonRoot 검증에 숫자 UID 필요
            runAsGroup: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
