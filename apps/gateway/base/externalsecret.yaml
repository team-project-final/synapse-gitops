apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gateway-external-secret
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: synapse
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: TO_BE_PATCHED
    kind: ClusterSecretStore
  target:
    name: gateway-secret
    creationPolicy: Owner
  data:
    - secretKey: SPRING_DATA_REDIS_PASSWORD
      remoteRef:
        key: synapse/dev/gateway/redis-password
    # gateway.jwt.public-key — 미설정 시 JwtDecoderConfig fail-fast로 CrashLoop (W5 Day1 dev 실측).
    # PR #128은 local-k8s 전용이라 AWS overlay에 미반영이었음. 값은 base64 DER/PEM 모두 허용(RsaPublicKeyParser).
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: synapse/dev/gateway/jwt-public-key
