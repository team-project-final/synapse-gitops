apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gateway-external-secret
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: synapse
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: TO_BE_PATCHED
    kind: ClusterSecretStore
  target:
    name: gateway-secret
    creationPolicy: Owner
  data:
    - secretKey: SPRING_DATA_REDIS_PASSWORD
      remoteRef:
        key: synapse/dev/gateway/redis-password
    # gateway.jwt.public-key — 미설정 시 JwtDecoderConfig fail-fast로 CrashLoop (W5 Day1 dev 실측).
    # PR #128은 local-k8s 전용이라 AWS overlay에 미반영이었음. 값은 base64 DER/PEM 모두 허용(RsaPublicKeyParser).
    # 서명 주체(platform-svc)의 공개키를 단일 출처로 참조 — gateway 전용 사본(synapse/dev/gateway/jwt-public-key)은
    # 06-08 시드 때 다른 키가 들어가 전 인증 API 401을 유발(#196). 사본 경로는 폐기.
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: synapse/dev/platform-svc/jwt-public-key
