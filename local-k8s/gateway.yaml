apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels: { app: gateway, app.kubernetes.io/name: gateway, app.kubernetes.io/part-of: synapse }
spec:
  replicas: 1
  selector: { matchLabels: { app: gateway } }
  template:
    metadata: { labels: { app: gateway } }
    spec:
      containers:
        - name: gateway
          image: synapse-gateway:local
          imagePullPolicy: IfNotPresent
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: SERVER_PORT, value: "8080" }
            - { name: SPRING_DATA_REDIS_HOST, value: redis }
            - { name: SPRING_DATA_REDIS_PORT, value: "6379" }
            - { name: SPRING_DATA_REDIS_PASSWORD, value: redis_local }
            - { name: PLATFORM_SVC_URI, value: "http://platform-svc:80" }
            - { name: ENGAGEMENT_SVC_URI, value: "http://engagement-svc:80" }
            - { name: KNOWLEDGE_SVC_URI, value: "http://knowledge-svc:80" }
            - { name: LEARNING_SVC_URI, value: "http://learning-card:80" }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels: { app: gateway }
spec:
  selector: { app: gateway }
  ports: [ { port: 80, targetPort: 8080 } ]
