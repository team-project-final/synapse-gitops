apiVersion: apps/v1
kind: Deployment
metadata: { name: elasticsearch, labels: { app: elasticsearch } }
spec:
  replicas: 1
  selector: { matchLabels: { app: elasticsearch } }
  template:
    metadata: { labels: { app: elasticsearch } }
    spec:
      containers:
        - name: elasticsearch
          # TODO(FS-D): nori 플러그인 포함 커스텀 이미지로 교체
          image: docker.elastic.co/elasticsearch/elasticsearch:9.2.1
          env:
            - { name: discovery.type, value: single-node }
            - { name: xpack.security.enabled, value: "false" }
            - { name: ES_JAVA_OPTS, value: "-Xms256m -Xmx256m" }
            - { name: bootstrap.memory_lock, value: "false" }
          ports: [ { containerPort: 9200 } ]
          readinessProbe:
            httpGet: { path: /_cluster/health, port: 9200 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket: { port: 9200 }
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5   # kafka/zk/schema-registry와 동일하게 콜드스타트 여유
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: 1000m, memory: 1Gi }   # 256m heap + Lucene off-heap/page cache 여유
---
apiVersion: v1
kind: Service
metadata: { name: elasticsearch }
spec:
  selector: { app: elasticsearch }
  ports: [ { port: 9200, targetPort: 9200 } ]
