apiVersion: apps/v1
kind: Deployment
metadata: { name: zookeeper, labels: { app: zookeeper } }
spec:
  replicas: 1
  selector: { matchLabels: { app: zookeeper } }
  template:
    metadata: { labels: { app: zookeeper } }
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.7.0
          env:
            - { name: ZOOKEEPER_CLIENT_PORT, value: "2181" }
            - { name: ZOOKEEPER_TICK_TIME, value: "2000" }
          ports: [ { containerPort: 2181 } ]
          readinessProbe:
            tcpSocket: { port: 2181 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 2181 }
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 5   # GC 일시정지 시 불필요한 재시작 방지
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 384Mi }   # cp-zookeeper JVM — kafka 등록 시 256Mi OOM 위험
---
apiVersion: v1
kind: Service
metadata: { name: zookeeper }
spec:
  selector: { app: zookeeper }
  ports: [ { port: 2181, targetPort: 2181 } ]
