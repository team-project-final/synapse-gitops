apiVersion: apps/v1
kind: Deployment
metadata: { name: opensearch, labels: { app: opensearch } }
spec:
  replicas: 1
  selector: { matchLabels: { app: opensearch } }
  template:
    metadata: { labels: { app: opensearch } }
    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.11.0
          env:
            - { name: discovery.type, value: single-node }
            - { name: plugins.security.disabled, value: "true" }
            - { name: OPENSEARCH_JAVA_OPTS, value: "-Xms256m -Xmx256m" }
            - { name: DISABLE_INSTALL_DEMO_CONFIG, value: "true" }
          ports: [ { containerPort: 9200 } ]
          readinessProbe:
            httpGet: { path: /_cluster/health, port: 9200 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket: { port: 9200 }
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5   # kafka/zk/schema-registry와 동일하게 콜드스타트 여유
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: 1000m, memory: 1Gi }   # 256m heap + Lucene off-heap/page cache 여유(768Mi는 OOM 위험)
---
apiVersion: v1
kind: Service
metadata: { name: opensearch }
spec:
  selector: { app: opensearch }
  ports: [ { port: 9200, targetPort: 9200 } ]
