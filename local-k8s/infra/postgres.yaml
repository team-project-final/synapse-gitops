apiVersion: apps/v1
kind: Deployment
metadata: { name: postgres, labels: { app: postgres } }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16   # knowledge/learning-ai의 CREATE EXTENSION vector 지원
          env:
            - { name: POSTGRES_DB, value: synapse }
            - { name: POSTGRES_USER, value: synapse }
            - { name: POSTGRES_PASSWORD, value: synapse_local }
          ports: [ { containerPort: 5432 } ]
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "synapse", "-d", "synapse"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "synapse"]
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: initdb
          configMap:
            name: postgres-initdb
---
apiVersion: v1
kind: Service
metadata: { name: postgres }
spec:
  selector: { app: postgres }
  ports: [ { port: 5432, targetPort: 5432 } ]
