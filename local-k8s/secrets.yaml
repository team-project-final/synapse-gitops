apiVersion: v1
kind: Secret
metadata: { name: learning-ai-secret }
type: Opaque
stringData:
  # learning-ai는 pydantic env_prefix="LEARNING_AI_" 를 쓰므로 키 이름에 prefix 필수
  # (OPENAI_API_KEY 로 주면 앱이 못 읽어 기동 실패). 실제 키는 git에 커밋하지 말고 클러스터에 별도 주입:
  #   kubectl -n synapse-local create secret generic learning-ai-secret \
  #     --from-literal=LEARNING_AI_OPENAI_API_KEY=<real-key> --dry-run=client -o yaml | kubectl apply -f -
  LEARNING_AI_OPENAI_API_KEY: sk-mock
  LEARNING_AI_ANTHROPIC_API_KEY: sk-mock
  DATABASE_PASSWORD: synapse_local
---
