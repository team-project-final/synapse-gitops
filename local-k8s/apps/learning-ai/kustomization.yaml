apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../apps/learning-ai/base
patches:
  - patch: |
      $patch: delete
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: learning-ai-external-secret
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: learning-ai-config
      data:
        DATABASE_HOST: postgres
        DATABASE_PORT: "5432"
        DATABASE_NAME: synapse_learning_ai
        KAFKA_BROKERS: kafka:9092
        # learning-ai는 pydantic env_prefix="LEARNING_AI_" 를 쓰므로 설정 키에 prefix 필수.
        # (prefix 없는 KAFKA_BROKERS 는 앱이 무시 — 기본값 localhost로 폴백해 기동 실패)
        LEARNING_AI_DATABASE_URL: postgresql+asyncpg://synapse:synapse_local@postgres:5432/synapse_learning_ai
        LEARNING_AI_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
        LEARNING_AI_REDIS_URL: redis://:redis_local@redis:6379/0
        LEARNING_AI_NOTE_SERVICE_URL: http://knowledge-svc
        LEARNING_AI_LEARNING_CARD_SERVICE_URL: http://learning-card
        LEARNING_AI_SCHEMA_REGISTRY_URL: http://schema-registry:8081
  # enableServiceLinks=false: 서비스링크 env 주입 차단
  # 주의: learning-ai는 OPENAI_API_KEY 시크릿이 없으면 기동 실패함(별도 주입 필요).
  - target:
      kind: Deployment
      name: learning-ai
    patch: |
      - op: add
        path: /spec/template/spec/enableServiceLinks
        value: false
images:
  - name: ghcr.io/team-project-final/synapse-learning-ai
    newName: synapse-learning-ai
    newTag: local
