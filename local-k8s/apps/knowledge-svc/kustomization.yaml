apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../apps/knowledge-svc/base
patches:
  - patch: |
      $patch: delete
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: knowledge-svc-external-secret
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: knowledge-svc-config
      data:
        DATABASE_HOST: postgres
        DATABASE_PORT: "5432"
        DATABASE_NAME: synapse_knowledge
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/synapse_knowledge
        SPRING_DATASOURCE_USERNAME: synapse
        KAFKA_BROKERS: kafka:9092
        ELASTICSEARCH_URIS: http://elasticsearch:9200
        REDIS_HOST: redis
        REDIS_PORT: "6379"
        SPRING_DATA_REDIS_HOST: redis
        SPRING_DATA_REDIS_PORT: "6379"
        # 앱은 KAFKA_BOOTSTRAP_SERVERS 를 읽음(KAFKA_BROKERS만 주면 localhost 폴백).
        KAFKA_BOOTSTRAP_SERVERS: kafka:9092
        SCHEMA_REGISTRY_URL: http://schema-registry:8081
  # enableServiceLinks=false: REDIS_PORT=tcp://... 주입으로 인한 NumberFormatException 차단
  - target:
      kind: Deployment
      name: knowledge-svc
    patch: |
      - op: add
        path: /spec/template/spec/enableServiceLinks
        value: false
images:
  - name: ghcr.io/team-project-final/synapse-knowledge-svc
    newName: synapse-knowledge-svc
    newTag: local
