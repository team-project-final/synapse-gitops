apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: synapse-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: synapse.rules
      rules:
        - alert: SynapsePodDown
          expr: up{namespace=~"synapse-.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.pod }} 5분 이상 다운"
        - alert: SynapseHighMemory
          expr: |
            sum by (pod,namespace) (container_memory_working_set_bytes{namespace=~"synapse-.*"})
            / sum by (pod,namespace) (kube_pod_container_resource_limits{namespace=~"synapse-.*",resource="memory"}) > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.pod }} 메모리 90% 초과"
        - alert: SynapseHigh5xx
          expr: |
            sum by (namespace,app_kubernetes_io_name) (rate(http_server_requests_seconds_count{namespace=~"synapse-.*",status=~"5.."}[5m]))
            / sum by (namespace,app_kubernetes_io_name) (rate(http_server_requests_seconds_count{namespace=~"synapse-.*"}[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "{{ $labels.app_kubernetes_io_name }} 5xx 비율 5% 초과"
    # W2 Step 5.4 이월(D-041): ESO 동기화 실패 가시화.
    # ESO 컨트롤러 메트릭 prefix = externalsecret_ (단수). 라이브 발화 전제: ESO 메트릭 스크레이프
    #   (external-secrets helm `serviceMonitor.enabled=true` 또는 ESO 서비스 대상 ServiceMonitor).
    - name: external-secrets.rules
      rules:
        - alert: ESOSyncErrors
          expr: increase(externalsecret_sync_calls_error[15m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "ESO 동기화 실패 — {{ $labels.namespace }}/{{ $labels.name }} (15m 내 sync error)"
        - alert: ESOSecretNotReady
          expr: externalsecret_status_condition{condition="Ready",status="True"} == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "ExternalSecret Ready 아님 — {{ $labels.namespace }}/{{ $labels.name }} (15분 지속)"
    - name: velero.rules
      rules:
        - alert: VeleroBackupFailed
          expr: increase(velero_backup_failure_total[1h]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Velero 백업 실패 (schedule {{ $labels.schedule }})"
        - alert: VeleroBackupPartialFailure
          expr: increase(velero_backup_partial_failure_total[1h]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Velero 백업 부분 실패 (schedule {{ $labels.schedule }})"
