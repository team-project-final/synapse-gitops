# kube-prometheus-stack helm values
# 설치: helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#         -n monitoring -f infra/monitoring/kube-prometheus-stack-values.yaml
prometheus:
  prometheusSpec:
    retention: 15d
    # repo의 ServiceMonitor/PrometheusRule(release 라벨 무관)도 수집하도록
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi

grafana:
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard

alertmanager:
  alertmanagerSpec:
    # Task C1의 ExternalSecret이 만든 k8s secret을 /etc/alertmanager/secrets/ 아래 마운트
    secrets:
      - alertmanager-slack
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
  config:
    route:
      receiver: slack
      group_by:
        - alertname
        - namespace
      routes:
        - receiver: slack
          matchers:
            - severity=~"critical|warning"
    receivers:
      - name: slack
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack/slack-webhook-url
            channel: "#synapse-gitops"
            send_resolved: true
            title: '{{ .CommonAnnotations.summary }}'
