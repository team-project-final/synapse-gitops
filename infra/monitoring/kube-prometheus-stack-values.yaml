# kube-prometheus-stack helm values
# 설치: helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#         -n monitoring -f infra/monitoring/kube-prometheus-stack-values.yaml
prometheus:
  prometheusSpec:
    retention: 15d
    # repo의 ServiceMonitor/PrometheusRule(release 라벨 무관)도 수집하도록
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi

# EKS는 컨트롤플레인(controller-manager·scheduler·etcd)을 AWS가 매니지드로 운영하며
# 메트릭 endpoint를 노출하지 않음 → 차트 기본 enabled 룰이 KubeControllerManagerDown·
# KubeSchedulerDown 등을 영구 firing(false-positive, #194). 해당 컴포넌트 ServiceMonitor·룰을 끔.
# (kube-proxy는 EKS 노드에서 실제 동작·메트릭 노출하므로 유지.)
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false

grafana:
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard

alertmanager:
  alertmanagerSpec:
    # Task C1의 ExternalSecret이 만든 k8s secret을 /etc/alertmanager/secrets/ 아래 마운트
    secrets:
      - alertmanager-slack
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
  config:
    route:
      receiver: slack
      group_by:
        - alertname
        - namespace
      routes:
        - receiver: slack
          matchers:
            - severity=~"critical|warning"
    receivers:
      - name: slack
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack/slack-webhook-url
            # #final-project-1-team (C0B3JEU46R1). 기존 #synapse-gitops는 미존재 채널이라 알람 미도착.
            # incoming webhook은 생성 시 채널 고정 → 이 채널 webhook URL을 secret alertmanager-slack에 시드해야 실제 도착.
            channel: "#final-project-1-team"
            send_resolved: true
            title: '{{ .CommonAnnotations.summary }}'
