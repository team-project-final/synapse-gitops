# 공통 라벨 app.kubernetes.io/part-of=synapse, 포트명 http 기준
# Spring 4앱: /actuator/prometheus, learning-ai(Python, 8090): /metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: synapse-spring
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - synapse-dev
      - synapse-staging
  selector:
    matchExpressions:
      - key: app.kubernetes.io/part-of
        operator: In
        values: [synapse]
      # actuator prometheus 비대상 제외(#207): learning-ai(별도 SM /metrics)·frontend(nginx 정적)·
      # elasticsearch(exporter 미구성)·schema-registry(JMX exporter 미구성) — 포함 시 스크랩 실패로
      # TargetDown/SynapsePodDown 상시 firing. ES/SR exporter 도입 시 재포함.
      # gateway는 Spring이라 유지 — exposure에 prometheus 추가는 gateway 레포 트랙(#207 제안 2).
      - key: app.kubernetes.io/name
        operator: NotIn
        values: [learning-ai, frontend, elasticsearch, schema-registry]
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: synapse-learning-ai
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - synapse-dev
      - synapse-staging
  selector:
    matchLabels:
      app.kubernetes.io/name: learning-ai
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
