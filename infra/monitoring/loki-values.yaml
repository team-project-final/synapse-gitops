# Loki 단일 바이너리 모드 (소규모 dev/staging용)
# 설치: helm install loki grafana/loki -n monitoring -f infra/monitoring/loki-values.yaml
deploymentMode: SingleBinary
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 720h  # 30일
singleBinary:
  replicas: 1
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
# 소규모 노드용 — memcached 캐시 비활성(메모리 절약)
chunksCache:
  enabled: false
resultsCache:
  enabled: false
