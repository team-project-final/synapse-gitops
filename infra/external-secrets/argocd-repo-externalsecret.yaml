# AWS SM의 git PAT(synapse/gitops/git-token)를 ArgoCD repository 자격 시크릿으로 동기화.
# image-updater의 git write-back(write-back-method: git)이 이 자격으로 main에 커밋한다.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-repo-synapse-gitops
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: repo-synapse-gitops
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: https://github.com/team-project-final/synapse-gitops
        username: git
        password: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: synapse/gitops/git-token
        property: token
