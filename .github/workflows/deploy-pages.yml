name: Deploy Runbook Site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/runbooks/**'
      - 'docs/synapse-developer-guide.md'
      - 'site/**'
      - 'scripts/parse-runbooks.dart'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # build_docs.mjs는 synapse-gitops/와 synapse-shared/가 동일 부모 아래 있다고 가정한다
      # (WORKSPACE = site/scripts 기준 ../../../). 두 레포를 서브디렉터리로 체크아웃.
      - name: Checkout synapse-gitops
        uses: actions/checkout@v4
        with:
          path: synapse-gitops

      - name: Checkout synapse-shared (sibling)
        uses: actions/checkout@v4
        with:
          repository: team-project-final/synapse-shared
          path: synapse-shared
          # synapse-shared는 public → 익명 체크아웃. (이전 SHARED_REPO_TOKEN 미등록으로 전 배포 실패, 2026-05-26~)

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Parse runbooks (Markdown to JSON)
        working-directory: synapse-gitops
        run: dart run scripts/parse-runbooks.dart

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # AI 요약 캐시를 런 간 유지 — 키 부재 시 build_docs.mjs가 요약을 건너뛴다(NO-OP)
      - name: Cache doc summaries
        uses: actions/cache@v4
        with:
          path: synapse-gitops/site/scripts/.summary-cache.json
          key: doc-summaries-${{ hashFiles('synapse-gitops/docs/runbooks/**', 'synapse-shared/docs/**') }}
          restore-keys: |
            doc-summaries-

      - name: Build docs JSON (build_docs.mjs)
        working-directory: synapse-gitops/site/scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm ci && node build_docs.mjs

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: synapse-gitops/site
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: synapse-gitops/site
        run: flutter build web --release --base-href /synapse-gitops/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: synapse-gitops/site/build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
