name: Deploy Runbook Site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/runbooks/**'
      - 'docs/synapse-developer-guide.md'
      - 'site/**'
      - 'scripts/parse-runbooks.dart'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Parse runbooks (Markdown to JSON)
        run: dart run scripts/parse-runbooks.dart

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: site
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: site
        run: flutter build web --release --base-href /synapse-gitops/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
