# argocd-image-updater PR write-back (#126): image-updater가 push한 image-updater-<svc> 브랜치를
# main으로 자동 PR. main 직접 push(Maintain bypass) 대신 PR+required check(validate) 흐름 유지.
# 토큰: #126 옵션3(전용 자동화 ID) — GitHub App(synapse-gitops-bot) 설치토큰 사용.
#       GITHUB_TOKEN으로 만든 PR은 pull_request 워크플로(validate)를 트리거하지 않아 required
#       check가 영원히 미보고되므로 App 토큰(비-GITHUB_TOKEN)이 필요. App 토큰은 런타임 발급(만료 1h).
name: image-updater PR

on:
  push:
    branches:
      - 'image-updater-*'

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate App token (#126 옵션3 전용 자동화 ID)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
      - name: Open PR to main (idempotent)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          # gh pr view는 closed PR도 매칭 → 닫힌 PR이 있으면 새 PR을 영영 안 만드는 버그.
          # open 상태만 idempotent 체크.
          if [ -n "$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open --json number --jq '.[0].number')" ]; then
            echo "PR already open for $BRANCH — image-updater가 브랜치를 갱신하면 기존 PR에 반영됨."
            exit 0
          fi
          gh pr create --repo "$GITHUB_REPOSITORY" \
            --base main --head "$BRANCH" \
            --title "deploy(image-updater): $BRANCH" \
            --body "argocd-image-updater 자동 이미지 태그 bump. \`validate\` 통과 후 리뷰/머지하면 배포됩니다. (#126 PR write-back)"
