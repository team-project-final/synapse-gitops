name: Validate Kubernetes Manifests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.4.3'

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: yamllint -d relaxed apps/ argocd/ infra/

      - name: Kustomize build all overlays
        run: |
          failed=0
          for overlay in apps/*/overlays/*/kustomization.yaml; do
            dir="$(dirname "$overlay")"
            echo "--- Building: $dir ---"
            if ! kustomize build "$dir" > /dev/null; then
              echo "::error::kustomize build failed for $dir"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi
