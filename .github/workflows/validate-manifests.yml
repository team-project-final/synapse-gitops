name: Validate Kubernetes Manifests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kustomize
        # NOTE: setup-kustomize@v2 triggers Node.js 16 warning — no v3 available yet.
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.4.3'

      - name: Cache pip (yamllint)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-yamllint-${{ runner.os }}

      - name: Install yamllint
        run: pip install yamllint

      # kustomize build 자체는 sub-second라 결과 캐싱 이득이 미미 → 실제 CI 비용인
      # kubeconform 바이너리 다운로드를 버전 키로 캐싱한다(W1 이월 D-041, CI 속도 개선).
      - name: Cache kubeconform
        id: cache-kubeconform
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/kubeconform
          key: kubeconform-v0.6.7-${{ runner.os }}-amd64

      - name: Install kubeconform
        if: steps.cache-kubeconform.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz kubeconform
          mv kubeconform ~/.local/bin/

      - name: Add kubeconform to PATH
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/kubeconform" -v

      - name: Lint YAML
        run: yamllint -c .yamllint apps/ argocd/ infra/

      - name: Kustomize build all overlays
        run: |
          failed=0
          for overlay in apps/*/overlays/*/kustomization.yaml; do
            dir="$(dirname "$overlay")"
            echo "--- Building: $dir ---"
            if ! kustomize build "$dir" > /dev/null; then
              echo "::error::kustomize build failed for $dir"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

      - name: Kubeconform validate
        run: |
          failed=0
          for overlay in apps/*/overlays/*/kustomization.yaml; do
            dir="$(dirname "$overlay")"
            echo "--- Validating: $dir ---"
            if ! kustomize build "$dir" | kubeconform -strict -ignore-missing-schemas -summary -output text; then
              echo "::error::kubeconform failed for $dir"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

  # 렌더된 매니페스트 diff(base → PR)를 PR 코멘트로 요약 (정보성, 머지 비차단)
  diff-comment:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.4.3'

      - name: Render base vs head diff
        run: |
          set -euo pipefail
          git fetch origin "$GITHUB_BASE_REF" --depth=1
          git worktree add -q /tmp/base "origin/$GITHUB_BASE_REF"
          OUT=pr-diff.md
          echo "<!-- kustomize-diff -->" > "$OUT"
          echo "## 📦 Kustomize 렌더 diff (\`$GITHUB_BASE_REF\` → PR)" >> "$OUT"
          changed=0
          for overlay in apps/*/overlays/*/kustomization.yaml; do
            dir="$(dirname "$overlay")"
            name="${dir#apps/}"
            head_render="$(kustomize build "$dir" 2>/dev/null || echo 'BUILD FAILED')"
            base_render=""
            [ -d "/tmp/base/$dir" ] && base_render="$(kustomize build "/tmp/base/$dir" 2>/dev/null || echo '')"
            d="$(diff -u <(echo "$base_render") <(echo "$head_render") || true)"
            if [ -n "$d" ]; then
              changed=1
              {
                echo ""
                echo "<details><summary><code>$name</code></summary>"
                echo ""
                echo '```diff'
                echo "$d" | tail -n +3 | head -300
                echo '```'
                echo ""
                echo "</details>"
              } >> "$OUT"
            fi
          done
          [ "$changed" -eq 0 ] && echo "" >> "$OUT" && echo "_렌더 결과 변경 없음._" >> "$OUT"
          git worktree remove --force /tmp/base

      - name: Upsert PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-diff.md', 'utf8');
            const marker = '<!-- kustomize-diff -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body,
              });
            }
